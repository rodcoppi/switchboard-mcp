<!DOCTYPE html>
<!-- lang=en: every string in this file is English (project convention D8), and
     a screen reader was announcing them with Portuguese pronunciation. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switchboard</title>
  <!-- xterm.js: the ONE thing this page loads that it did not write itself, and
       the hub serves it from its own node_modules — nothing is fetched off this
       machine. It is a terminal EMULATOR, the piece you cannot hand-roll; the
       pty on the other end is tmux, not node-pty. -->
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css" />
  <script src="/vendor/xterm/lib/xterm.js"></script>
  <script src="/vendor/addon-fit/lib/addon-fit.js"></script>
  <!-- Inline favicon to avoid a /favicon.ico 404 in the hub logs. The mark is
       the "⇄" of the header and of the Windows shortcut icon (assets/switchboard.ico,
       drawn by scripts/make-icon.mjs) — same shape, same amber, one product. -->
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3.5' fill='%230e141d'/%3E%3Cpath d='M2.6 6.2h8.1V4.3L14 7.1l-3.3 2.8V8H2.6z' fill='%23ffbf5e'/%3E%3Cpath d='M13.4 11.6H5.3v1.9L2 10.7 5.3 7.9v1.9h8.1z' fill='%23f5a623'/%3E%3C/svg%3E"
  />
  <style>
    /* =====================================================================
       SWITCHBOARD — operator's patchbay / signal console
       ---------------------------------------------------------------------
       DESIGN TOKENS live in the ONE :root block below and are a CONTRACT:
       the owner (a designer) reskins the whole console from here. The markup
       keeps stable semantic hooks (.agent-card, .msg-row, .status-dot, …)
       that the JS queries — never rename them; add/restyle freely.

       Identity: a telephone switchboard. Near-black cool slate panels, a
       single warm SIGNAL AMBER accent (telecom / CRT / brass jack), phosphor
       LEDs for presence. Mono-forward, because the subject is honest machine
       traffic. The rail is a PATCHBAY of jack rows; the feed is a TRANSCRIPT —
       chat bubbles, because that is what a human reads without being taught,
       each one naming who it was for, because these calls are directed and a
       chat room's "everyone hears everything" would be a lie here.
       ===================================================================== */
    :root {
      /* --- surfaces: cool near-black slate, raised panels, hairlines ------ */
      --bg:          #0a0e13;
      --bg-elev:     #111823;
      --bg-elev-2:   #141c28;
      --bg-inset:    #070b10;
      --bg-hover:    #172232;
      --border:      #232e3d;
      --border-soft: #1a2431;

      /* --- text: soft white -> dim -> faint ------------------------------ */
      --text:        #e6edf3;
      --text-dim:    #8b98a8;
      --text-faint:  #5a6673;

      /* --- SIGNATURE: warm signal amber (the whole identity) -------------- */
      --accent:        #f5a623;
      --accent-bright: #ffbf5e;
      --accent-fg:     #120b02;               /* text on filled amber */
      --accent-wash:   rgba(245, 166, 35, 0.13);
      --accent-line:   rgba(245, 166, 35, 0.42);

      /* --- status LEDs (glowing lamps, not flat dots) -------------------- */
      --online:      #3fb950;
      --offline:     #5a6673;
      --led-online:  0 0 0 3px rgba(63, 185, 80, 0.13), 0 0 9px 1px rgba(63, 185, 80, 0.55);
      --led-offline: 0 0 0 3px rgba(90, 102, 115, 0.10);
      --led-amber:   0 0 0 3px rgba(245, 166, 35, 0.14), 0 0 9px 1px rgba(245, 166, 35, 0.55);

      /* --- semantic roles (kept as the JS/markup expect) ---------------- */
      --unread-bg:   #f5a623;
      --unread-fg:   #120b02;
      --danger:      #e5534b;
      --warn:        #f5a623;                  /* caution == the signal amber */
      --ok:          #3fb950;

      /* --- type: mono-forward console; sans reserved for operator voice -- */
      --mono: "JetBrains Mono", "SF Mono", "Cascadia Code", ui-monospace,
        SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
        sans-serif;

      /* --- type scale ---------------------------------------------------- */
      --fs-eyebrow: 10px;
      --fs-xs:  11px;
      --fs-sm:  12px;
      --fs-body: 12.5px;
      --fs-md:  13px;
      --fs-name: 13.5px;
      --fs-wordmark: 15.5px;

      /* --- geometry ------------------------------------------------------ */
      --sidebar-w: 322px;
      --radius: 7px;
      --radius-sm: 5px;
      --radius-pill: 999px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 620px at 78% -10%, #0e1622 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: var(--fs-body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: var(--accent); }

    /* Shared operator-panel eyebrow: uppercase mono, wide tracking. */
    .eyebrow {
      font-family: var(--mono);
      font-size: var(--fs-eyebrow);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    /* Keyboard focus — a single amber ring everywhere (accessibility floor). */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ------------------------------- Header ------------------------------ */
    .app-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 11px 18px;
      background: linear-gradient(180deg, var(--bg-elev-2), var(--bg-elev));
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(245, 166, 35, 0.05);
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      white-space: nowrap;
    }
    .brand-jack {
      font-size: 18px;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(245, 166, 35, 0.55);
    }
    .wordmark {
      font-family: var(--mono);
      font-weight: 700;
      font-size: var(--fs-wordmark);
      letter-spacing: 3.5px;
      color: var(--text);
    }

    .hub-status {
      display: flex;
      align-items: center;
      gap: 18px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .hub-status .metric {
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-faint);
    }
    .hub-status .metric b { color: var(--text); font-weight: 600; }

    .conn-state {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 3px 11px; border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-inset);
      font-size: var(--fs-eyebrow);
      font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.4px;
      color: var(--text-dim);
    }
    .conn-state .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-faint);
    }
    .conn-state[data-state="live"]        { color: var(--online); border-color: color-mix(in srgb, var(--online) 42%, transparent); }
    .conn-state[data-state="live"] .dot   { background: var(--online); box-shadow: var(--led-online); }
    .conn-state[data-state="connecting"]  { color: var(--warn); border-color: var(--accent-line); }
    .conn-state[data-state="connecting"] .dot { background: var(--warn); box-shadow: var(--led-amber); }
    .conn-state[data-state="reconnecting"]{ color: var(--danger); border-color: color-mix(in srgb, var(--danger) 42%, transparent); }
    .conn-state[data-state="reconnecting"] .dot { background: var(--danger); box-shadow: 0 0 8px 1px rgba(229, 83, 75, 0.55); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }

    .header-spacer { flex: 1 1 auto; }
    /* [hidden] LAST, and it must exist on every rule that sets `display`: the
       attribute is only a UA-stylesheet `display:none`, so any `display` of ours
       beats it and the element stays on screen while the JS believes it hid it.
       This has now bitten the card menus and this snippet. */
    [hidden] { display: none !important; }

    .mcp-add {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 5px 4px 11px;
      max-width: 100%;
      min-width: 0;
    }
    .mcp-add code {
      font-family: var(--mono);
      font-size: var(--fs-eyebrow);
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 44ch;
    }
    .btn {
      background: var(--bg-elev-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 11px;
      font-size: var(--fs-xs);
      white-space: nowrap;
      transition: border-color 0.12s var(--ease), background 0.12s var(--ease), color 0.12s var(--ease);
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn-copy { color: var(--accent); font-weight: 600; }

    /* ------------------------------- Layout ------------------------------ */
    .layout { flex: 1 1 auto; display: flex; min-height: 0; }

    /* ----------------------------- Sidebar (PATCHBAY) -------------------- */
    .sidebar {
      flex: 0 0 var(--sidebar-w);
      width: var(--sidebar-w);
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg), #090d12);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar-head {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border-soft);
    }
    .rail-count {
      font-family: var(--mono);
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-wash);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius-pill);
      padding: 1px 9px;
      min-width: 24px;
      text-align: center;
    }
    .agents { flex: 1 1 auto; overflow-y: auto; padding: 10px 10px 4px; }
    .empty-hint {
      padding: 20px 14px;
      color: var(--text-faint);
      font-family: var(--sans);
      font-size: var(--fs-sm);
      line-height: 1.6;
    }

    /* --- the JACK ROW: an agent patched into the board ------------------- */
    .agent-card {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-areas:
        "dot name badges"
        "dot role actions";
      column-gap: 11px;
      row-gap: 3px;
      align-items: center;
      padding: 11px 12px 11px 14px;
      margin-bottom: 8px;
      background: var(--bg-elev);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.14s var(--ease), background 0.14s var(--ease), transform 0.14s var(--ease);
    }
    /* the patch rail: a thin amber cable-end that lights when the row is live/active */
    .agent-card::before {
      content: "";
      position: absolute;
      left: 0; top: 9px; bottom: 9px;
      width: 2px;
      border-radius: 0 2px 2px 0;
      background: transparent;
      transition: background 0.14s var(--ease);
    }
    .agent-card:hover { background: var(--bg-hover); border-color: var(--border); }
    .agent-card:hover::before { background: var(--border); }
    .agent-card.active {
      border-color: var(--accent-line);
      background: linear-gradient(90deg, var(--accent-wash), transparent 82%), var(--bg-elev);
    }
    .agent-card.active::before { background: var(--accent); box-shadow: 0 0 8px rgba(245, 166, 35, 0.6); }
    .agent-card.offline { opacity: 0.66; }

    /* the LAMP: a glowing phosphor jack indicator, not a flat circle */
    .status-dot {
      grid-area: dot;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--offline);
      align-self: start;
      margin-top: 5px;
    }
    .status-dot.online  { background: var(--online); box-shadow: var(--led-online); }
    .status-dot.offline { background: var(--offline); box-shadow: var(--led-offline); }

    .agent-name {
      grid-area: name;
      font-family: var(--mono);
      font-weight: 600;
      font-size: var(--fs-name);
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* Inline rename: the name cell itself becomes the input (same grid area,
       so the card never reflows while editing). */
    .agent-rename-input {
      grid-area: name;
      width: 100%;
      min-width: 0;
      background: var(--bg-inset);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1px 5px;
      font-family: var(--mono);
      font-weight: 600;
      font-size: var(--fs-name);
    }
    .agent-rename-input:focus { outline: none; box-shadow: 0 0 0 3px var(--accent-wash); }

    .agent-role {
      grid-area: role;
      color: var(--text-dim);
      font-size: var(--fs-xs);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .agent-badges {
      grid-area: badges;
      display: flex; align-items: center; gap: 7px; justify-self: end;
    }
    .agent-actions {
      grid-area: actions;
      display: flex; align-items: center; gap: 6px; justify-self: end;
    }

    .mcp-icon {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-faint);
    }
    .mcp-icon.connected {
      color: var(--accent);
      border-color: var(--accent-line);
      background: var(--accent-wash);
    }
    /* Which agent CLI the card's agent runs — same chip metrics as .mcp-icon
       so the two sit as one badge row. Deliberately NOT accent-colored: the
       accent means "connected/active", and the type is neutral information. */
    .agent-type-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg-inset);
    }
    .unread-badge {
      min-width: 19px;
      height: 19px;
      padding: 0 6px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--unread-bg);
      color: var(--unread-fg);
      font-family: var(--mono);
      font-size: var(--fs-xs); font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: 0 0 8px rgba(245, 166, 35, 0.4);
    }
    .remove-btn.confirming {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Card actions: one primary button + a compact menu. */
    .open-btn, .reopen-btn {
      border-color: var(--accent-line);
      color: var(--accent);
    }
    .open-btn:hover, .reopen-btn:hover { background: var(--accent-wash); }
    .agent-menu-wrap { position: relative; }
    .agent-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 5px);
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* `hidden` must beat display:flex, else every card's menu renders at once. */
    .agent-menu[hidden] { display: none; }
    .agent-menu:not([hidden]) {
      padding: 6px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.55);
      min-width: 104px;
    }
    .agent-menu-item { text-align: left; }
    .mute-toggle, .nudge-btn, .open-btn, .reopen-btn, .rename-btn, .remove-btn, .menu-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: var(--fs-xs);
      padding: 3px 9px;
      line-height: 1.3;
      transition: border-color 0.12s var(--ease), color 0.12s var(--ease), background 0.12s var(--ease);
    }
    .mute-toggle:hover, .nudge-btn:hover, .open-btn:hover, .reopen-btn:hover, .rename-btn:hover, .remove-btn:hover, .menu-btn:hover { color: var(--text); border-color: var(--accent); }
    .menu-btn { padding: 3px 7px; letter-spacing: 1px; }
    .mute-toggle.muted { color: var(--warn); border-color: var(--accent-line); }
    .remove-btn:hover { border-color: var(--danger); color: var(--danger); }
    /* A menu action that exists but is not available right now (rename on an
       online agent). Legible, not invisible: clicking it says what to do. */
    .agent-menu-item.disabled { color: var(--text-faint); opacity: 0.55; }
    .agent-menu-item.disabled:hover { color: var(--text-faint); border-color: var(--border); }

    /* NUDGE = a brief amber pulse. The nudge control lives in the (hidden)
       card menu, so :has() lifts the pulse onto the whole jack row — the
       operator sees the line light up even with the menu closed. */
    .nudge-btn.nudging { animation: pulse 0.6s ease-out; }
    .agent-card:has(.nudge-btn.nudging) {
      animation: rowpulse 0.7s ease-out;
    }
    .agent-card:has(.nudge-btn.nudging)::before {
      background: var(--accent);
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.7);
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 var(--accent-line); border-color: var(--accent); color: var(--accent); }
      100% { box-shadow: 0 0 0 10px transparent; }
    }
    @keyframes rowpulse {
      0%   { background: var(--accent-wash); box-shadow: inset 0 0 0 1px var(--accent-line); }
      100% { background: var(--bg-elev); box-shadow: none; }
    }

    /* --------------------------- Launcher form --------------------------- */
    .launcher {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-elev), var(--bg-elev-2));
    }
    .launcher-title {
      font-family: var(--mono);
      font-size: var(--fs-eyebrow);
      font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .launcher-title::after {
      content: "";
      flex: 1 1 auto;
      height: 1px;
      background: var(--border-soft);
    }
    .launcher-label {
      display: block;
      margin-bottom: 4px;
      font-family: var(--mono);
      font-size: var(--fs-eyebrow); text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-faint);
    }
    .launch-input {
      width: 100%;
      background: var(--bg-inset);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      font-family: var(--mono);
      font-size: var(--fs-sm);
      transition: border-color 0.12s var(--ease), box-shadow 0.12s var(--ease);
    }
    .launch-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }
    .launch-input::placeholder { color: var(--text-faint); }
    .launcher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .launcher-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-top: 3px;
    }
    .launcher-toggle {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text-dim);
      font-size: var(--fs-xs);
      cursor: pointer;
      user-select: none;
    }
    .launcher-toggle input { accent-color: var(--accent); margin: 0; }
    /* Agent-type choice: a 2-button segmented control. Radio inputs do the
       state (keyboard + form semantics for free); the label is the visible
       segment and :checked drives its look — no JS class juggling. */
    .launcher-segmented {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--bg-inset);
    }
    .launcher-segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .launcher-segment {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
      color: var(--text-faint);
      cursor: pointer;
      user-select: none;
      transition: background 0.12s var(--ease), color 0.12s var(--ease);
    }
    /* Vendor marks (inline SVG — the dashboard loads no external asset). They
       inherit currentColor, so a segment's dim/amber state carries the logo
       with it instead of fighting the console palette. */
    .agent-logo { width: 13px; height: 13px; flex: none; display: block; }
    .agent-type-chip .agent-logo { width: 10px; height: 10px; }
    .launcher-segment + .launcher-segment { border-left: 1px solid var(--border); }
    .launcher-segment:hover { color: var(--text-dim); }
    .launcher-segmented input:checked + .launcher-segment {
      background: var(--accent-wash);
      color: var(--accent);
    }
    .launcher-segmented input:focus-visible + .launcher-segment {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--accent-line);
    }
    .launch-btn {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-weight: 700;
      font-size: var(--fs-sm);
      text-transform: uppercase; letter-spacing: 1.2px;
      padding: 7px 18px;
      transition: filter 0.12s var(--ease), box-shadow 0.12s var(--ease);
    }
    .launch-btn:hover { background: var(--accent-bright); box-shadow: 0 0 16px rgba(245, 166, 35, 0.35); }
    .launch-btn:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

    /* ----------------------------- Dir picker ---------------------------- */
    .launcher-dir-row { display: flex; gap: 7px; }
    .launcher-dir-row .launch-input { flex: 1 1 auto; min-width: 0; }
    .dirpicker-browse { flex: 0 0 auto; font-size: var(--fs-xs); padding: 5px 11px; }
    .dirpicker {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 7px;
      padding: 9px;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .dirpicker[hidden] { display: none; }
    .dirpicker-head { display: flex; align-items: center; gap: 8px; }
    .dirpicker-path {
      flex: 1 1 auto; min-width: 0;
      font-family: var(--mono); font-size: var(--fs-xs); color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dirpicker-close {
      flex: 0 0 auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: var(--fs-xs);
      padding: 2px 8px;
      line-height: 1.4;
    }
    .dirpicker-close:hover { color: var(--danger); border-color: var(--danger); }
    .dirpicker-list {
      display: flex; flex-direction: column;
      max-height: 188px; overflow-y: auto;
    }
    .dirpicker-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 7px;
      border-radius: 4px;
      font-family: var(--mono); font-size: var(--fs-sm);
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .dirpicker-entry:hover { background: var(--bg-hover); }
    .dirpicker-up { color: var(--text-dim); }
    .dirpicker-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dirpicker-badge {
      flex: 0 0 auto; margin-left: auto;
      font-size: 9px; letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--ok) 45%, transparent);
      color: var(--ok);
    }
    .dirpicker-hint {
      padding: 5px 7px;
      color: var(--text-faint);
      font-family: var(--sans); font-size: var(--fs-xs);
    }
    .dirpicker-foot { display: flex; justify-content: flex-end; }
    .dirpicker-select {
      background: var(--bg-elev-2);
      color: var(--accent);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: var(--fs-xs); font-weight: 600;
      padding: 4px 12px;
    }
    .dirpicker-select:hover { background: var(--accent-wash); }

    /* ------------------------------- Main -------------------------------- */
    .main { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg); }

    /* Messages header — the console panel label for the transcript. */
    .feed-head {
      flex: 0 0 auto;
      display: flex; align-items: baseline; gap: 12px;
      padding: 13px 18px 11px;
      border-bottom: 1px solid var(--border-soft);
    }
    .feed-head .sub {
      font-family: var(--sans);
      font-size: var(--fs-xs);
      color: var(--text-faint);
    }

    /* Group tabs: one room at a time. A group is a wall — agents in different
       groups cannot reach each other — so mixing their traffic in one scroll
       would show a conversation that never happened. */
    .group-tabs {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .group-tab {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: var(--fs-xs);
      cursor: pointer;
      transition: color 0.12s var(--ease), border-color 0.12s var(--ease);
    }
    .group-tab:hover { color: var(--text); border-color: var(--accent-line); }
    .group-tab.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-wash);
    }
    .group-tab .count { color: var(--text-faint); margin-left: 5px; }

    /* Both sit at the right end of the rail's header, together: the label and
       the count on the left, the two things you DO to this list on the right. */
    .groups-open { margin-left: auto; flex: none; }
    .launcher-open { margin-left: 6px; flex: none; }

    /* --------------------------- the tab strip ---------------------------
       Messages and every open agent, side by side. */
    .tabs {
      flex: 0 0 auto;
      display: flex;
      align-items: stretch;
      gap: 2px;
      padding: 0 12px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
    }
    .tab-strip { display: flex; align-items: stretch; gap: 2px; min-width: 0; overflow-x: auto; }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: none;
      max-width: 220px;
      padding: 9px 12px;
      background: transparent;
      border: none;
      /* The active tab is joined to the panel below it by an amber underline —
         a tab is a thing you are INSIDE, not a button you pressed. */
      border-bottom: 2px solid transparent;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: var(--fs-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.12s var(--ease), border-color 0.12s var(--ease);
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-mark { color: var(--accent); font-weight: 700; }
    .tab .name { overflow: hidden; text-overflow: ellipsis; }
    .tab .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
    .tab .dot.online { background: var(--online); }
    .tab .dot.offline { background: var(--offline); }
    .tab-close {
      margin-left: 2px;
      padding: 0 3px;
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      border-radius: 3px;
    }
    .tab-close:hover { color: var(--danger); background: var(--bg-hover); }
    .tab-unread {
      min-width: 18px;
      padding: 1px 5px;
      text-align: center;
      border-radius: 9px;
      background: var(--unread-bg);
      color: var(--unread-fg);
      font-size: var(--fs-eyebrow);
      font-weight: 700;
    }

    /* Lightbox. One in the file, for the launcher — a form you touch once per
       project has no business owning half the rail, which is now the list of
       agents you switch between. */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8vh 16px 16px;
      background: rgba(4, 7, 11, 0.72);
      overflow-y: auto;
      animation: lightin 0.12s var(--ease);
    }
    .lightbox[hidden] { display: none; }
    @keyframes lightin { from { opacity: 0 } to { opacity: 1 } }
    .lightbox-card {
      width: 100%;
      max-width: 560px;
      background: var(--bg-elev);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
    }
    .lightbox-head {
      display: flex;
      align-items: center;
      padding: 12px 14px 0;
    }
    .lightbox-head .dirpicker-close { margin-left: auto; }
    .lightbox .launcher { border: none; background: none; padding: 12px 14px 14px; }
    .lightbox .launcher-title { display: none; } /* the head says it already */

    /* ------------------------- the agent's screen ------------------------
       tmux is the pty and xterm.js is the emulator, so this is the real
       terminal: colours, cursor, Ctrl-C, the lot. It exists to kill the pile
       of Windows terminal windows — the rail on the left is already the tab
       bar, so the screen simply takes over the main panel. */
    .screen {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg-inset);
    }
    .screen[hidden] { display: none; }
    .screen-head {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .screen-name {
      font-family: var(--mono);
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
    }
    .screen-hint {
      font-family: var(--sans);
      font-size: var(--fs-xs);
      color: var(--text-faint);
    }
    .screen-hint.stale { color: var(--danger); }
    .screen-head .btn { margin-left: auto; }
    .screen-head .dirpicker-close { margin-left: 0; }
    /* xterm paints its own grid; it just needs a box that does not collapse.
       CENTRED, and on the terminal's own colour: while mirroring, the grid is
       the pane's and its shape rarely matches the panel's, so something is
       always left over. Centred on a matching background that reads as margin;
       pinned top-left on the page's background it read as the terminal having
       fallen into the corner of a black hole. */
    /* xterm fills this box: the server sizes the tmux window to fit it (native
       font, no scaling), so the grid matches and there is nothing to centre. */
    .screen-term {
      flex: 1 1 auto;
      min-height: 0;
      padding: 6px;
      background: #070b10; /* xterm's own background (see the theme below) */
    }
    .screen-term .xterm { width: 100%; height: 100%; }

    /* The Groups panel — the body of its lightbox now. It used to drop under
       the feed header and shove the transcript down, which is what a VIEW does;
       this is a dialog, and the launcher next door was already one. */
    .groups-panel {
      max-height: 70vh;
      overflow-y: auto;
      padding: 12px 14px 14px;
    }
    /* Wider than the launcher: this one lists every room and everyone in them. */
    .lightbox-card-wide { max-width: 720px; }
    .groups-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .groups-hint {
      font-family: var(--sans);
      font-size: var(--fs-xs);
      color: var(--text-faint);
    }
    .groups-head .dirpicker-close { margin-left: auto; }

    .groups-body { display: flex; flex-direction: column; gap: 12px; }
    .groups-group {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-inset);
      padding: 8px 10px 10px;
    }
    .groups-group-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .groups-group-name {
      font-family: var(--mono);
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
    }
    .groups-group-count { font-family: var(--mono); font-size: var(--fs-xs); color: var(--text-faint); }
    .groups-rename {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: var(--fs-xs);
      cursor: pointer;
    }
    .groups-rename:hover { color: var(--accent); text-decoration: underline; }

    .groups-member {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-family: var(--mono);
      font-size: var(--fs-xs);
    }
    .groups-member + .groups-member { border-top: 1px solid var(--border-soft); }
    .groups-member .name { color: var(--text); font-weight: 600; }
    .groups-member .role { color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .groups-member select {
      margin-left: auto;
      flex: none;
      background: var(--bg-elev-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
    }
    .groups-member select:hover { border-color: var(--accent-line); }
    .groups-empty { font-family: var(--sans); font-size: var(--fs-xs); color: var(--text-faint); padding: 2px 0; }

    .groups-foot { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
    .groups-new-input { max-width: 220px; }

    /* Group header in the rail: the agents under it are the ones that can
       actually talk to each other. Click to fold the group away — with several
       projects open the rail is the thing that gets long. */
    .group-head {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px 4px;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      font-family: var(--mono);
      font-size: var(--fs-eyebrow);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-faint);
      transition: color 0.12s var(--ease);
    }
    .group-head:hover { color: var(--text-dim); }
    .group-head .caret {
      display: inline-block;
      width: 8px;
      transition: transform 0.14s var(--ease);
    }
    .group-head.collapsed .caret { transform: rotate(-90deg); }
    /* The count is the point of collapsing: folded, it is all you see of the
       group, so it has to say how much is in there. */
    .group-head .tally {
      font-variant-numeric: tabular-nums;
      color: var(--text-faint);
    }
    .group-head.collapsed .tally { color: var(--accent); }
    .group-head .rule {
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .filter-bar {
      flex: 0 0 auto;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: var(--accent-wash);
      border-bottom: 1px solid var(--accent-line);
      font-family: var(--mono);
      font-size: var(--fs-sm);
    }
    .filter-bar.active { display: flex; }
    .filter-bar .label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: var(--fs-eyebrow); }
    .filter-bar .target { color: var(--accent); font-weight: 600; }
    .filter-clear {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--accent-line);
      color: var(--text-dim);
      border-radius: 4px;
      padding: 2px 10px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
    }
    .filter-clear:hover { color: var(--text); border-color: var(--accent); }

    .feed {
      flex: 1 1 auto;
      overflow-y: auto;
      /* NO padding-top. A sticky child cannot rise above its containing block,
         which is this element's CONTENT box — so 6px of padding here pinned the
         day divider 6px below the top and left a sliver of the previous
         message showing above it. The dividers carry their own top padding. */
      padding: 0 0 12px;
      font-family: var(--mono);
      font-size: var(--fs-body);
      background:
        repeating-linear-gradient(180deg, transparent 0 39px, rgba(255,255,255,0.014) 39px 40px),
        var(--bg);
    }
    .feed .empty-hint { font-family: var(--sans); padding: 30px 20px; max-width: 46ch; }

    /* --- the transcript: a chat, but of DIRECTED calls -------------------
       Bubbles, because that is what a human reads without training. The one
       thing an ordinary chat does not have to say is WHO a message was for —
       in a group everyone hears everything. Here "a → b" is a private call c
       never sees, so the recipient is printed in the bubble header rather than
       implied by the room. The operator (the human) is the only party with a
       side of its own: right, amber. Everything else is incoming traffic. */

    /* Day divider: the fix for "the order makes no sense". Time-only stamps on
       a multi-day history read as shuffled — 10:37 sitting above 19:02 is
       today above yesterday, and nothing said so. Sticky, so the day you are
       reading is always on screen. */
    /* The transcript is a COLUMN pinned to the left, under the panel label and
       against the patchbay, where the eye already is. It is still capped: the
       two lanes (agents left, the operator right) only associate while they
       stay within one eyeful, and a 2000px-wide line of mono text is unreadable
       anyway. Rows and dividers share the cap so the column has one spine. */
    .day-divider, .msg-row {
      width: 100%;
      max-width: 1200px;
    }

    .day-divider {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px 8px;
      background: linear-gradient(180deg, var(--bg) 60%, transparent);
      font-family: var(--mono);
      font-size: var(--fs-eyebrow);
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--text-faint);
    }
    .day-divider::before, .day-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .msg-row {
      display: flex;
      /* Top, not bottom: the disc labels the NAME in the bubble header, and a
         tall bubble would strand it a screen away from the thing it names. */
      align-items: flex-start;
      gap: 9px;
      padding: 3px 18px;
      transition: background 0.12s var(--ease);
    }
    .msg-row + .msg-row { margin-top: 5px; }
    /* The operator is you: your line runs down the other side. */
    .msg-row.from-operator { flex-direction: row-reverse; }

    /* Stable identity mark. The hue is the ONLY per-agent colour on the page
       and it lives here, on a 26px disc — the amber stays the interface's
       accent (actions, the operator, unread), never an agent's identity. */
    .msg-avatar {
      flex: none;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--bg);
      user-select: none;
    }

    .msg-bubble {
      position: relative;
      max-width: min(104ch, 88%);
      min-width: 0;
      padding: 8px 12px 6px;
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 3px;   /* the tail points at the sender */
      background: var(--bg-elev);
    }
    .msg-row:hover .msg-bubble { border-color: var(--border); background: var(--bg-elev-2); }
    .msg-row.from-operator .msg-bubble {
      border-radius: 12px 12px 3px 12px;
      border-color: var(--accent-line);
      background: var(--accent-wash);
    }
    .msg-row.unread .msg-bubble { border-color: var(--accent-line); }
    .msg-row.broadcast .msg-bubble {
      max-width: none;
      flex: 1;
      border-radius: 12px;
      border-style: dashed;
      border-color: var(--accent-line);
      background: linear-gradient(90deg, var(--accent-wash), transparent 70%);
    }
    /* Only the just-arrived bubble animates; the feed is chronological, so the
       newest is the LAST child. */
    .feed > .msg-row:last-child .msg-bubble { animation: rowin 0.22s var(--ease); }
    @keyframes rowin {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 3px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
      color: var(--text-faint);
    }
    .msg-from { color: var(--text); font-weight: 600; }
    .msg-from.operator { color: var(--accent); }         /* the operator: amber */
    /* "alpha to beta", not "alpha → beta": the arrow is a symbol you decode,
       the word is a sentence you read. */
    .msg-rel { color: var(--text-faint); }
    .msg-to { color: var(--text-dim); font-weight: 600; }
    .msg-to.all { color: var(--accent); }
    .msg-body {
      color: var(--text);
      font-family: var(--mono);
      font-size: var(--fs-body);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    /* Agents write essays at each other. Unclamped, one message fills the
       viewport and the transcript stops being scannable. */
    .msg-body.clamped {
      max-height: 7.75em;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(180deg, #000 60%, transparent);
      mask-image: linear-gradient(180deg, #000 60%, transparent);
    }
    .msg-more {
      margin-top: 2px;
      padding: 0;
      background: none;
      border: none;
      color: var(--accent);
      font-family: var(--mono);
      font-size: var(--fs-xs);
      cursor: pointer;
    }
    .msg-more:hover { text-decoration: underline; }

    .msg-foot {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 4px;
      font-family: var(--mono);
      font-size: var(--fs-xs);
    }
    .msg-row.from-operator .msg-foot { justify-content: flex-end; }
    .msg-time {
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .msg-read-flag { letter-spacing: 0.3px; }
    .msg-read-flag.pending { color: var(--accent); }
    .msg-read-flag.read { color: var(--text-faint); }

    /* ----------------------------- Composer ------------------------------ */
    .field { flex: 1 1 auto; display: flex; flex-direction: column; }
    select, textarea {
      background: var(--bg-inset);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: var(--fs-body);
      resize: none;
      transition: border-color 0.12s var(--ease), box-shadow 0.12s var(--ease);
    }
    select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }
    textarea { min-height: 62px; width: 100%; line-height: 1.5; }
    .send-btn {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.4px;
      padding: 9px 18px;
      transition: filter 0.12s var(--ease), box-shadow 0.12s var(--ease);
    }
    .send-btn:hover { background: var(--accent-bright); box-shadow: 0 0 16px rgba(245, 166, 35, 0.35); }
    .send-btn:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

    /* ------------------------------ Toasts ------------------------------- */
    .toasts {
      position: fixed;
      bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 9px;
      z-index: 50;
      max-width: min(420px, 90vw);
    }
    .toast {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-family: var(--sans);
      font-size: var(--fs-sm);
      color: var(--text);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      animation: toast-in 0.14s ease-out;
    }
    .toast.ok    { border-left-color: var(--ok); }
    .toast.warn  { border-left-color: var(--warn); }
    .toast.error { border-left-color: var(--danger); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(7px); } }

    /* Scrollbars — quiet, console-appropriate. */
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ----------------------------- Responsive --------------------------- */
    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar {
        flex: 0 0 auto;
        width: 100%;
        max-height: 42vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .mcp-add code { max-width: 28ch; }
    }

    /* Motion is purposeful; honor the OS reduced-motion request. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="brand-jack" aria-hidden="true">⇄</span><span class="wordmark">SWITCHBOARD</span></div>
    <div class="hub-status">
      <span class="conn-state" id="conn-state" data-state="connecting">
        <span class="dot"></span><span id="conn-label">connecting</span>
      </span>
      <span class="metric">online <b id="online-count">0</b>/<span id="agent-count">0</span></span>
      <span class="metric">uptime <b id="uptime">—</b></span>
      <span class="metric">v<span id="version">—</span></span>
    </div>
    <div class="header-spacer"></div>
    <!-- The one-time "register this hub in Claude Code" command. It only shows
         on a hub with no agents yet, because that is the only time it is the
         next thing to do — `switchboard setup` runs it for you, and once an
         agent exists you are long past it. It used to sit here forever. -->
    <div class="mcp-add" id="mcp-add" hidden>
      <code id="mcp-cmd" title=""></code>
      <button class="btn btn-copy" id="copy-mcp" type="button">copy</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="eyebrow">Patchbay</span>
        <span id="sidebar-count" class="rail-count">0</span>
        <!-- Groups and + agent live HERE, over the rail: both are about the
             agents listed below them. Groups was up in the tab strip, which is
             about which SCREEN you are looking at — a different question. -->
        <button class="btn groups-open" id="groups-open" type="button"
          title="See every group and move agents between them">Groups</button>
        <button class="btn launcher-open" id="launcher-open" type="button"
          title="Launch a new agent">+ agent</button>
      </div>

      <div class="agents" id="agents"></div>

    </aside>

    <main class="main">
      <!-- The tab strip. Messages is the first tab and always there; every
           agent you open becomes one beside it. The transcript used to be
           "whatever the panel showed when no screen was open", which made the
           one view that is not an agent behave unlike everything next to it. -->
      <div class="tabs" id="tabs">
        <button class="tab active" id="tab-messages" type="button"
          title="The messages your agents sent each other">
          <span class="tab-mark">⇄</span>
          <span>Messages</span>
          <span class="tab-unread" id="tab-messages-unread" hidden></span>
        </button>
        <div class="tab-strip" id="tab-strip"></div>
      </div>

      <div class="feed-head">
        <span class="sub">what your agents said to each other — newest at the bottom</span>
        <div class="group-tabs" id="group-tabs"></div>
      </div>

      <div class="filter-bar" id="filter-bar">
        <span class="label">filtering by</span>
        <span class="target" id="filter-target"></span>
        <button class="filter-clear" id="filter-clear" type="button">clear filter ✕</button>
      </div>

      <div class="feed" id="feed"></div>

      <!-- The agent's real screen. Replaces the transcript rather than sitting
           beside it: the point is to stop juggling windows, not to add a pane
           you have to juggle. -->
      <div class="screen" id="screen" hidden>
        <div class="screen-head">
          <span class="screen-name" id="screen-name"></span>
          <span class="screen-hint" id="screen-hint">live — type here to drive it</span>
          <button class="btn" id="screen-window" type="button"
            title="Open this agent in a real Windows terminal window instead">window</button>
          <button class="dirpicker-close" id="screen-close" type="button"
            title="Back to the messages (Esc)">✕</button>
        </div>
        <div class="screen-term" id="screen-term"></div>
      </div>

      <!-- The operator composer lived here: a recipient picker, a textarea and
           a broadcast. It was a way to reach an agent back when the dashboard
           could not show you one. Now a card opens the agent's real screen and
           you type AT it, which is what the composer was approximating. Sending
           as "operator" is still a thing — `switchboard send <to> <msg>` — where
           it belongs: a script, not the panel you stare at all day. -->
    </main>
  </div>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script>
    "use strict";

    // =====================================================================
    // Switchboard dashboard — vanilla JS + SSE. No framework, no build, no
    // external asset (localhost, local trust boundary — everything inline).
    //
    // SECURITY / XSS: every value that comes from the hub (agent names, roles,
    // message bodies, from/to) is treated as untrusted — an agent on the
    // network can be adversarial/hallucinated (PRD section 15). We NEVER assign
    // server data to innerHTML: the DOM is built with createElement +
    // textContent only. The capability token never leaves the hub in the
    // shapes we read (PublicAgent / Message), so it can never reach here.
    // =====================================================================

    const $ = (sel) => document.querySelector(sel);

    const state = {
      agents: new Map(),   // name -> agent object (incl. unreadCount)
      messages: [],        // newest-first (matches GET /api/messages)
      msgIds: new Set(),   // dedup guard for message_created vs bootstrap
      filter: null,        // active agent-name filter, or null
      group: null,         // active group tab, or null for "all groups"
      sse: null,
      uptimeBase: null,    // { seconds, at }  — server uptime + local anchor
    };

    // --- tiny DOM helper: text is set via textContent (never innerHTML) -----
    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    // Seconds are noise in a transcript — "10:37" is when it was said. The
    // locale is the READER's (undefined), not a hardcoded one: this is the
    // viewer's clock, and the rest of the product is en.
    function fmtTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
    }

    /** Full stamp for a title= — the exact instant, when someone wants it. */
    function fmtFull(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleString(undefined, { dateStyle: "full", timeStyle: "medium" });
    }

    const DAY_MS = 86400000;

    /** Local midnight of a date — the boundary a human means by "day". */
    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    /**
     * "Today" / "Yesterday" / "Mon, 14 Jul" — the label of a day divider.
     * Named days beat dates for the two days anyone actually reads.
     */
    function fmtDayLabel(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      const days = Math.round((startOfDay(new Date()) - startOfDay(d)) / DAY_MS);
      if (days === 0) return "Today";
      if (days === 1) return "Yesterday";
      return d.toLocaleDateString(undefined, {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: startOfDay(d) < startOfDay(new Date()) - 300 * DAY_MS ? "numeric" : undefined,
      });
    }

    // Every agent gets one stable colour, hashed from its name so it survives
    // restarts and never depends on arrival order. Muted on purpose: these sit
    // beside the amber without competing with it for "this is actionable".
    const AGENT_HUES = ["#c8873a", "#5f9ea0", "#7fa860", "#a97fa8", "#c47a5c", "#7d86c4"];

    function agentHue(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return AGENT_HUES[h % AGENT_HUES.length];
    }

    /** Up to 2 characters — a name's first letters, digits included. */
    function monogram(name) {
      const letters = name.replace(/[^a-z0-9]/gi, "");
      return (letters.slice(0, 2) || "?").toUpperCase();
    }

    function fmtUptime(totalSeconds) {
      const s = Math.max(0, Math.floor(totalSeconds));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}h ${m}m ${sec}s`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }

    // --- toasts -----------------------------------------------------------
    function toast(message, kind = "ok", ttl = 4200) {
      const box = $("#toasts");
      const t = el("div", `toast ${kind}`, message);
      box.appendChild(t);
      setTimeout(() => {
        t.style.opacity = "0";
        t.style.transition = "opacity 0.25s";
        setTimeout(() => t.remove(), 260);
      }, ttl);
    }

    // --- agent state merge ------------------------------------------------
    // GET /api/agents carries unreadCount; the SSE agent_updated payload is a
    // PublicAgent and does NOT — so we PRESERVE the previous unreadCount when a
    // partial update arrives, and track deltas from message_created/read.
    function mergeAgent(incoming) {
      const prev = state.agents.get(incoming.name);
      const unreadCount =
        incoming.unreadCount != null
          ? incoming.unreadCount
          : prev
            ? prev.unreadCount
            : 0;
      state.agents.set(incoming.name, { ...prev, ...incoming, unreadCount });
    }

    function sortedAgents() {
      return [...state.agents.values()].sort((a, b) => {
        // online first, then by name — stable ordering for the redesign.
        if (a.status !== b.status) return a.status === "online" ? -1 : 1;
        return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
      });
    }

    // =====================================================================
    // Rendering
    // =====================================================================

    function renderHeader() {
      const agents = [...state.agents.values()];
      const online = agents.filter((a) => a.status === "online").length;
      $("#online-count").textContent = String(online);
      $("#agent-count").textContent = String(agents.length);
      $("#sidebar-count").textContent = String(agents.length);
      // The MCP registration line is a first-run instruction, not furniture.
      $("#mcp-add").hidden = agents.length > 0;

      // The Messages tab is active whenever no agent's screen is. And it counts
      // unread: with the panel showing a terminal, the transcript is off screen,
      // and a message arriving there would otherwise be invisible.
      $("#tab-messages").classList.toggle("active", screenState.name === null);
      const unread = agents.reduce((n, a) => n + (a.unreadCount || 0), 0);
      const badge = $("#tab-messages-unread");
      badge.hidden = unread === 0;
      badge.textContent = String(unread);
    }

    function renderUptime() {
      if (!state.uptimeBase) return;
      const secs =
        state.uptimeBase.seconds + (Date.now() - state.uptimeBase.at) / 1000;
      $("#uptime").textContent = fmtUptime(secs);
    }

    function setConnState(stateName, label) {
      const node = $("#conn-state");
      node.dataset.state = stateName;
      $("#conn-label").textContent = label;
    }

    // Agent types (mirrors src/shared/agent-types.ts). An agent record written
    // before the field existed has no agentType — every one of those was Claude
    // Code, so undefined resolves to "claude" rather than rendering blank.
    const AGENT_TYPE_LABELS = { claude: "CLAUDE", codex: "CODEX" };
    const AGENT_TYPE_TITLES = { claude: "Claude Code", codex: "Codex CLI" };

    // Vendor marks, same paths as the launcher's segmented control (the file
    // ships no external asset). Built with createElementNS — the "never
    // innerHTML" rule of this file holds even for these static constants.
    const AGENT_LOGO_PATHS = {
      claude:
        "M17.3041 3.541h-3.6718l6.696 16.918H24Zm-10.6082 0L0 20.459h3.7442l1.3693-3.5527h7.0052l1.3693 3.5527h3.7442L10.5363 3.541Zm-.3712 10.2232 2.2914-5.9456 2.2914 5.9456Z",
      codex:
        "M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.4593a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z",
    };

    function agentLogo(type) {
      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      svg.setAttribute("class", "agent-logo");
      const p = document.createElementNS(ns, "path");
      p.setAttribute("fill", "currentColor");
      p.setAttribute("d", AGENT_LOGO_PATHS[type] || AGENT_LOGO_PATHS.claude);
      svg.appendChild(p);
      return svg;
    }

    function agentTypeOf(agent) {
      return agent && agent.agentType === "codex" ? "codex" : "claude";
    }

    // Groups (mirrors resolveGroup in src/server/store.ts). An agent registered
    // before groups existed has no field and belongs with the rest of them.
    const DEFAULT_GROUP = "default";

    function groupOf(agent) {
      return (agent && agent.group) || DEFAULT_GROUP;
    }

    /**
     * Which room a message belongs to. Messages carry no group of their own —
     * they do not need to: agents can only message inside their group, so the
     * sender's group IS the conversation's. The operator is the exception, being
     * in no group and able to reach anyone, so its messages belong to whoever it
     * wrote to. Returns null when neither end is still registered (a removed
     * agent's history), which no room should claim.
     */
    function messageGroup(m) {
      const sender = state.agents.get(m.from);
      if (sender) return groupOf(sender);
      const recipient = state.agents.get(m.to);
      return recipient ? groupOf(recipient) : null;
    }

    /** Every group that has an agent, sorted — the rooms that exist. */
    function allGroups() {
      return [...new Set([...state.agents.values()].map(groupOf))].sort();
    }

    function renderAgents() {
      const container = $("#agents");
      container.textContent = "";
      const agents = sortedAgents();
      if (agents.length === 0) {
        container.appendChild(
          el(
            "div",
            "empty-hint",
            "No registered agents. Run `switchboard start <name>`.",
          ),
        );
        renderHeader();
        return;
      }
      // Grouped, under a header each: the rail then answers "who can talk to
      // whom" by its shape, which is the question a group exists to settle.
      //
      // The one case with no header is the install that never asked for groups:
      // everyone in `default`, where a label over the whole rail says nothing.
      // The moment you NAME a room, it gets its header even if it is the only
      // one — hiding it made a group you had just created and filled look like
      // it had vanished.
      const groups = allGroups();
      if (groups.length === 1 && groups[0] === DEFAULT_GROUP) {
        for (const agent of agents) container.appendChild(buildAgentCard(agent));
      } else {
        for (const group of groups) {
          const inGroup = agents.filter((a) => groupOf(a) === group);
          if (state.group && group !== state.group) continue;
          container.appendChild(buildGroupHead(group, inGroup));
          if (collapsedGroups.has(group)) continue; // folded: the tally speaks for it
          for (const agent of inGroup) container.appendChild(buildAgentCard(agent));
        }
      }
      renderHeader();
      // Both are derived from the agent set, so they belong to the one render
      // that already runs whenever an agent appears, moves group or leaves.
      renderGroupTabs();
      renderGroupOptions();
      renderTabs(); // the tabs carry each agent's dot and unread count
    }

    /**
     * A group's header in the rail, and its fold. Collapsed, the header is all
     * that is left of the group, so it carries the tally — how many agents are
     * in there and how many of those are up. Unread never hides: a folded group
     * with something waiting has to say so, or folding becomes a way to miss
     * messages.
     */
    function buildGroupHead(group, members) {
      const collapsed = collapsedGroups.has(group);
      const head = el("button", `group-head${collapsed ? " collapsed" : ""}`);
      head.type = "button";
      const online = members.filter((a) => a.status === "online").length;
      const unread = members.reduce((n, a) => n + (a.unreadCount || 0), 0);
      head.title = collapsed
        ? `Unfold ${group} (${members.length} agents, ${online} online)`
        : `Fold ${group} away`;

      head.append(
        el("span", "caret", "▾"),
        el("span", null, group),
        el("span", "tally", `${online}/${members.length}`),
      );
      if (unread > 0) {
        const badge = el("span", "unread-badge", String(unread));
        badge.title = `${unread} unread in ${group}`;
        head.appendChild(badge);
      }
      head.appendChild(el("span", "rule"));

      head.addEventListener("click", () => {
        if (collapsedGroups.has(group)) collapsedGroups.delete(group);
        else collapsedGroups.add(group);
        renderAgents();
      });
      return head;
    }

    function renderGroupTabs() {
      const tabs = $("#group-tabs");
      tabs.textContent = "";
      const groups = allGroups();
      // One room is not a choice.
      if (groups.length < 2) return;

      const mk = (label, value, count) => {
        const btn = el("button", `group-tab${state.group === value ? " active" : ""}`);
        btn.type = "button";
        btn.appendChild(document.createTextNode(label));
        if (count != null) btn.appendChild(el("span", "count", String(count)));
        btn.title =
          value === null
            ? "Every group's traffic in one scroll"
            : `Only what the ${value} group said — these agents can only talk to each other`;
        btn.addEventListener("click", () => {
          state.group = value;
          renderAgents();
          renderFeed();
        });
        return btn;
      };

      tabs.appendChild(mk("all", null));
      for (const group of groups) {
        tabs.appendChild(mk(group, group, [...state.agents.values()].filter((a) => groupOf(a) === group).length));
      }
    }

    function buildAgentCard(agent) {
      const card = el("div", "agent-card");
      card.classList.add(agent.status === "online" ? "online" : "offline");
      if (state.filter === agent.name) card.classList.add("active");
      card.dataset.name = agent.name;

      const dot = el("span", `status-dot ${agent.status === "online" ? "online" : "offline"}`);
      dot.title = agent.status;

      const name = el("div", "agent-name", agent.name);
      name.title = agent.name;
      const role = el("div", "agent-role", agent.role || "—");
      role.title = agent.role || "";

      // Badges: agent-type chip + MCP chip + unread count.
      const badges = el("div", "agent-badges");
      const type = agentTypeOf(agent);
      const typeChip = el("span", "agent-type-chip");
      typeChip.appendChild(agentLogo(type));
      typeChip.appendChild(document.createTextNode(AGENT_TYPE_LABELS[type]));
      typeChip.title = `This agent runs ${AGENT_TYPE_TITLES[type]}`;
      badges.appendChild(typeChip);
      const mcp = el("span", `mcp-icon${agent.mcpConnected ? " connected" : ""}`, "MCP");
      mcp.title = agent.mcpConnected
        ? "MCP connected (join confirmed)"
        : "MCP not connected yet";
      badges.appendChild(mcp);
      if (agent.unreadCount > 0) {
        const badge = el("span", "unread-badge", String(agent.unreadCount));
        badge.title = `${agent.unreadCount} unread`;
        badges.appendChild(badge);
      }

      // Actions (owner UX feedback: one PRIMARY action per state, the rest in
      // a compact ⋯ menu — four inline buttons crowded the card):
      //   online  → [screen] + ⋯(window, nudge, group, mute)
      //   offline → [reopen] + ⋯(group, mute, remove)
      // Stop propagation everywhere so a control click never toggles the
      // card's feed filter.
      const actions = el("div", "agent-actions");
      const online = agent.status === "online";

      // The agent's screen is the CARD's job now (one click, no button), so the
      // primary here is the thing the card cannot do: pop a real Windows
      // terminal, for when you want an actual window rather than the panel.
      const primary = el("button", online ? "open-btn" : "reopen-btn", online ? "window" : "reopen");
      primary.type = "button";
      primary.title = online
        ? `Open a Windows terminal window attached to "${agent.name}" (the card alone shows its screen here)`
        : `Relaunch "${agent.name}" in ${agent.cwd} (continues its conversation) and open its window`;
      primary.addEventListener("click", (ev) => {
        ev.stopPropagation();
        if (online) openAgentTerminal(agent.name, primary);
        else reopenAgent(agent, primary);
      });

      const menuWrap = el("div", "agent-menu-wrap");
      const kebab = el("button", "menu-btn", "⋯");
      kebab.type = "button";
      kebab.title = "More actions";
      const menu = el("div", "agent-menu");
      menu.hidden = true;

      function menuItem(cls, label, title, onClick) {
        const item = el("button", `agent-menu-item ${cls}`, label);
        item.type = "button";
        item.title = title;
        item.addEventListener("click", (ev) => {
          ev.stopPropagation();
          onClick(item);
        });
        return item;
      }

      menu.appendChild(
        menuItem(
          "nudge-btn",
          "nudge",
          "Force a manual nudge (respects the pane guard)",
          () => {
            closeMenus();
            forceNudge(agent.name);
          },
        ),
      );
      // Opens the Groups panel rather than editing here: a group is a container
      // holding several agents, so it is managed where you can see all of them
      // at once. (This used to turn the NAME cell into a group field, which put
      // the group's name where the agent's name lives — confusing, and it left
      // no way to rename a group or put a second agent in one.)
      menu.appendChild(
        menuItem(
          "group-btn",
          "group…",
          `Move "${agent.name}" to another group — it can only message agents in the same one`,
          () => {
            closeMenus();
            openGroups(agent.name);
          },
        ),
      );
      menu.appendChild(
        menuItem(
          `mute-toggle${agent.muted ? " muted" : ""}`,
          agent.muted ? "unmute" : "mute",
          agent.muted ? "Unmute nudges" : "Mute nudges (messages are still recorded)",
          () => {
            closeMenus();
            toggleMute(agent.name, !agent.muted);
          },
        ),
      );
      // Rename: the name cell becomes an inline input (no blocking dialogs).
      // Only an OFFLINE agent can be renamed — a live one would re-join under
      // its old name. The item stays VISIBLE while online (greyed, saying why)
      // rather than vanishing: hiding it made the feature look nonexistent to
      // anyone whose agents are all up.
      menu.appendChild(
        menuItem(
          `rename-btn${online ? " disabled" : ""}`,
          "rename",
          online
            ? `Stop "${agent.name}" first — a running agent would re-join under its old name`
            : "Rename this agent — its message history follows the new name",
          () => {
            closeMenus();
            if (online) {
              toast(
                `To rename "${agent.name}", stop it first: switchboard stop ${agent.name}`,
                "warn",
              );
              return;
            }
            startRename(agent, name);
          },
        ),
      );
      if (!online) {
        // Remove: two-click inline confirmation (no blocking browser dialogs).
        menu.appendChild(
          menuItem(
            "remove-btn",
            "remove",
            "Remove this agent from the Hub registry (messages are kept)",
            (item) => {
              if (item.dataset.confirming === "1") {
                closeMenus();
                removeAgent(agent.name);
                return;
              }
              item.dataset.confirming = "1";
              item.textContent = "sure?";
              item.classList.add("confirming");
              setTimeout(() => {
                item.dataset.confirming = "";
                item.textContent = "remove";
                item.classList.remove("confirming");
              }, 3000);
            },
          ),
        );
      }

      kebab.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const wasHidden = menu.hidden;
        closeMenus();
        menu.hidden = !wasHidden;
      });
      menuWrap.append(kebab, menu);

      actions.append(primary, menuWrap);

      // dataset hook kept for the nudge pulse animation (SSE nudge_sent).
      const pulseTarget = menu.querySelector(".nudge-btn");
      if (pulseTarget) pulseTarget.dataset.nudgeFor = agent.name;

      card.append(dot, name, badges, role, actions);
      // Clicking the agent shows the AGENT — its screen, live. The rail is the
      // tab bar and a card is the tab, so making you click a second button to
      // see the thing you just selected was friction for nothing.
      //
      // This used to filter the transcript instead. That is still there, but as
      // what it always was: a filter, living inside Messages where filters
      // belong (see renderFilterBar).
      card.addEventListener("click", () => {
        if (agent.status === "online") openScreen(agent.name);
        else setFilter(agent.name); // no screen to show — fall back to its traffic
      });
      return card;
    }

    /** One menu open at a time; outside click / Esc closes (wired once below). */
    function closeMenus() {
      document.querySelectorAll(".agent-menu").forEach((m) => {
        m.hidden = true;
      });
    }
    document.addEventListener("click", closeMenus);
    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") closeMenus();
    });

    async function openAgentTerminal(name, btn) {
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/terminal`, {
          method: "POST",
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(body.error || `Could not open a window (HTTP ${res.status}).`, "warn");
          return;
        }
        toast(`Windows terminal opened for "${name}".`);
      } catch (err) {
        toast(`Could not open a window: ${err && err.message ? err.message : err}`, "warn");
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function reopenAgent(agent, btn) {
      btn.disabled = true;
      btn.textContent = "reopening…";
      try {
        const res = await fetch("/api/agents/launch", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            dir: agent.cwd,
            name: agent.name,
            continue: true,
            openTerminal: true,
            // Relaunch with the SAME CLI it was launched with: reopening a
            // codex agent as claude would resume the wrong conversation with
            // the wrong binary. Legacy records (no agentType) → claude.
            agentType: agentTypeOf(agent),
          }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(`Reopen failed: ${body.error || `HTTP ${res.status}`}`, "warn");
          return;
        }
        const conv = body.fallback
          ? "with a FRESH conversation (no resumable one found)"
          : "continuing its conversation";
        toast(
          body.terminalOpened
            ? `Agent "${agent.name}" reopened ${conv} — its window is opening.`
            : `Agent "${agent.name}" reopened ${conv}. No window could open — ` +
                `use the card's "open" button or: tmux attach -t ${agent.tmuxSession}`,
          body.terminalOpened ? "ok" : "warn",
        );
      } catch (err) {
        toast(`Reopen failed: ${err && err.message ? err.message : err}`, "warn");
      } finally {
        btn.disabled = false;
        btn.textContent = "reopen";
      }
    }

    /**
     * Swaps the card's name cell for an input prefilled with the current name:
     * Enter confirms, Esc / blur cancels — never a blocking browser dialog.
     * The `done` latch makes the three exits idempotent (confirming detaches
     * the focused input, which fires blur right behind it).
     */
    // An agent name is an ADDRESS (%name in a prompt, tmux "sb-<name>"), so the
    // hub only takes ^[a-z0-9][a-z0-9-]{1,30}$. Typing "Chefe de Redes" and
    // getting the regex back as an error makes the user guess the rule — so the
    // name inputs rewrite as you type ("chefe-de-redes") and you confirm what
    // you already see. Mirrors sanitizeAgentName in src/cli/wire.ts, which
    // derives the same shape from a folder name.
    //
    // keepTrailingHyphen: WHILE TYPING the hyphen a just-pressed space produced
    // must survive — trimming it on every keystroke makes "chefe-de"
    // impossible to type. It is trimmed on confirm instead.
    function sanitizeAgentNameInput(raw, keepTrailingHyphen) {
      let s = raw
        .toLowerCase()
        // Fold accents first: "João" → "joao", not "jo-o" (the invalid-run rule
        // below would otherwise eat the letter along with its diacritic).
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9-]+/g, "-") // any invalid run → one hyphen
        .replace(/-+/g, "-") // collapse repeats
        .replace(/^-+/, ""); // a name never starts with a hyphen
      if (!keepTrailingHyphen) s = s.replace(/-+$/, "");
      if (s.length > 31) s = s.slice(0, 31).replace(/-+$/, "");
      return s;
    }

    /**
     * Wires live sanitizing into a name input. Rewriting .value moves the caret
     * to the end, which fights anyone editing mid-string, so the caret is put
     * back where it was minus whatever the rewrite removed.
     */
    function bindAgentNameSanitizer(input) {
      input.addEventListener("input", () => {
        const before = input.value;
        const after = sanitizeAgentNameInput(before, true);
        if (after === before) return;
        const caret = input.selectionStart;
        input.value = after;
        const next = Math.max(0, caret - (before.length - after.length));
        input.setSelectionRange(next, next);
      });
    }

    function startRename(agent, nameEl) {
      const input = el("input", "agent-rename-input");
      input.type = "text";
      input.value = agent.name;
