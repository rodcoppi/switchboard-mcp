    // msgIds and loadAgents refreshes the authoritative unreadCount, so the
    // stream once more only ever adds to a freshly reconciled view.
    let sseConnectedOnce = false;

    // The hub heartbeats every 25s, so silence past ~70s (three missed beats)
    // means the stream is dead rather than the network being quiet. EventSource
    // will not tell us: it only raises onerror when a socket visibly breaks, and
    // the way this one dies is invisible — the dashboard sits in a Windows
    // browser, the hub in WSL2, and WSL2's localhost proxy can drop the tunnel
    // (as can sleeping the laptop) with both ends still believing it is open.
    // The pill stayed green and the feed silently stopped until a reload.
    const SSE_SILENCE_LIMIT_MS = 70_000;
    let lastSseAt = 0;
    let sseWatchdog = null;

    function startSseWatchdog() {
      if (sseWatchdog) clearInterval(sseWatchdog);
      sseWatchdog = setInterval(() => {
        if (Date.now() - lastSseAt < SSE_SILENCE_LIMIT_MS) return;
        // Reopening resyncs through the onopen path, so nothing missed in the
        // gap stays missed.
        setConnState("reconnecting", "reconnecting");
        if (state.sse) state.sse.close();
        connectSse();
      }, 10_000);
    }

    function connectSse() {
      const es = new EventSource("/api/events");
      state.sse = es;
      lastSseAt = Date.now();
      startSseWatchdog();
      es.onopen = () => {
        lastSseAt = Date.now();
        if (!sseConnectedOnce) {
          // First connect: boot() already fetched the snapshot, so just go live
          // (re-fetching here would be a harmless duplicate, but we skip it).
          sseConnectedOnce = true;
          setConnState("live", "live");
          return;
        }
        // Reconnect after a gap (hub restart, laptop sleep/wake, socket drop):
        // resync before flipping the pill back to "live", so the header never
        // claims freshness over a view that silently missed events.
        Promise.all([loadAgents(), loadMessages()])
          .then(() => {
            renderAgents();
            renderRecipients();
            renderFeed();
          })
          .catch(() => {
            toast("Failed to resync after reconnection.", "warn");
          })
          .finally(() => setConnState("live", "live"));
      };
      es.onmessage = (ev) => {
        lastSseAt = Date.now(); // any frame, heartbeat included, proves it lives
        let parsed;
        try {
          parsed = JSON.parse(ev.data);
        } catch {
          return; // malformed frame
        }
        if (parsed.type === "heartbeat") return; // its only job is the timestamp above
        handleSse(parsed);
      };
      // EventSource reconnects on its own; we only surface the state so the
      // operator knows the feed is stale until it recovers.
      es.onerror = () => setConnState("reconnecting", "reconnecting");
    }

    // =====================================================================
    // Actions (REST)
    // =====================================================================

    async function toggleMute(name, muted) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/mute`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ muted }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to change mute (HTTP ${res.status}).`, "error");
          return;
        }
        mergeAgent(data.agent); // agent_updated will also arrive via SSE
        renderAgents();
        renderRecipients();
        toast(`${name} ${muted ? "muted" : "unmuted"}.`, "ok");
      } catch {
        toast("Network failure while changing mute.", "error");
      }
    }

    async function forceNudge(name) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/nudge`, {
          method: "POST",
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          pulseNudge(name);
          toast(`Nudge sent to ${name}.`, "ok");
          return;
        }
        // 409 (unsafe pane / dead session), 404 (unknown), 501 (no
        // dispatcher). The hub message is already friendly — show it without breaking.
        toast(data.error || `Nudge not delivered to ${name} (HTTP ${res.status}).`, "warn");
      } catch {
        toast("Network failure while nudging.", "error");
      }
    }

    async function sendMessage(ev) {
      ev.preventDefault();
      const to = $("#recipient").value;
      const bodyEl = $("#composer-body");
      const body = bodyEl.value;
      if (body.trim().length === 0) {
        toast("Empty message: write something factual and actionable.", "warn");
        return;
      }
      const btn = $("#send-btn");
      btn.disabled = true;
      try {
        const res = await fetch("/api/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to, body }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to send (HTTP ${res.status}).`, "error");
          return;
        }
        bodyEl.value = "";
        toast(`Sent to ${to} (${data.delivery}).`, "ok");
      } catch {
        toast("Network failure while sending.", "error");
      } finally {
        btn.disabled = false;
      }
    }

    // Launch an agent from the dashboard: the hub creates the tmux session
    // running claude (POST /api/agents/launch). Success is confirmed by a
    // toast; the new agent card arrives via the agent_updated SSE. The hub
    // settles the session before answering (~2.5s, ~5s with the resume
    // fallback), so the button shows a busy state meanwhile. All feedback goes
    // through toast() → textContent (server data never touches innerHTML).
    /** The Claude|Codex segmented control's value (radios — one is always on). */
    function selectedAgentType() {
      const checked = document.querySelector('#launch-agent input[name="agentType"]:checked');
      return checked && checked.value === "codex" ? "codex" : "claude";
    }

    async function launchAgent(ev) {
      ev.preventDefault();
      const dir = $("#launch-dir").value.trim();
      if (dir.length === 0) {
        toast("Directory is required: the absolute path the agent should work in.", "warn");
        return;
      }
      const name = $("#launch-name").value.trim();
      const role = $("#launch-role").value.trim();
      const btn = $("#launch-btn");
      const prevLabel = btn.textContent;
      btn.disabled = true;
      btn.textContent = "launching…";
      try {
        // openTerminal: a launched agent should be VISIBLE — a Windows window
        // pops attached to its session (owner feedback; best-effort hub-side).
        const payload = {
          dir,
          continue: $("#launch-continue").checked,
          openTerminal: true,
          agentType: selectedAgentType(),
        };
        if (name) payload.name = name;
        if (role) payload.role = role;
        const res = await fetch("/api/agents/launch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to launch (HTTP ${res.status}).`, "error", 8000);
          return;
        }
        const agentName = data.agent && data.agent.name ? data.agent.name : name || dir;
        if (data.fallback) {
          toast(
            `No resumable conversation in ${dir} — opened a fresh session for ${agentName}.`,
            "warn",
            7000,
          );
        }
        toast(
          `Agent ${agentName} launched` +
            `${data.replaced ? " (replaced its previous session)" : ""}` +
            `${data.terminalOpened ? " — its window is opening" : ""}. ` +
            `The kickoff will instruct it to join.`,
          "ok",
        );
        $("#launch-dir").value = "";
        $("#launch-name").value = "";
        $("#launch-role").value = "";
        // No render here: the agent card arrives via the agent_updated SSE.
      } catch {
        toast("Network failure while launching.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = prevLabel;
      }
    }

    // =====================================================================
    // Dir picker — the launcher form's "Browse…" panel
    // =====================================================================
    // Lists the hub machine's directories via GET /api/fs/dirs (directory
    // NAMES only) so the operator picks the working folder by click instead
    // of typing a POSIX path (Windows Explorer paths pasted into the input
    // are translated server-side either way). Every server value rendered
    // here (paths, folder names) goes through el()/textContent — never
    // innerHTML (same XSS rule as the rest of this file).

    const dirpickerState = { path: null };

    async function dirpickerLoad(targetPath) {
      const list = $("#dirpicker-list");
      list.textContent = "";
      list.appendChild(el("div", "dirpicker-hint", "loading…"));
      try {
        // No path → the hub answers with its home directory.
        const url = targetPath
          ? `/api/fs/dirs?path=${encodeURIComponent(targetPath)}`
          : "/api/fs/dirs";
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        list.textContent = "";
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to list folders (HTTP ${res.status}).`, "error");
          list.appendChild(el("div", "dirpicker-hint", "Could not open this folder."));
          return;
        }
        dirpickerState.path = data.path;
        const pathEl = $("#dirpicker-path");
        pathEl.textContent = data.path;
        pathEl.title = data.path;
        if (data.parent !== null) {
          const up = el("div", "dirpicker-entry dirpicker-up", "..");
          up.title = data.parent;
          up.addEventListener("click", () => dirpickerLoad(data.parent));
          list.appendChild(up);
        }
        for (const d of data.dirs) {
          const row = el("div", "dirpicker-entry");
          row.title = d.path;
          row.appendChild(el("span", "dirpicker-name", d.name));
          if (d.hasConversation) {
            const badge = el("span", "dirpicker-badge", "conversation");
            badge.title =
              "This folder has a previous Claude Code conversation " +
              "(resumable with “continue conversation”).";
            row.appendChild(badge);
          }
          row.addEventListener("click", () => dirpickerLoad(d.path));
          list.appendChild(row);
        }
        if (data.dirs.length === 0) {
          list.appendChild(el("div", "dirpicker-hint", "No subfolders."));
        }
        if (data.truncated) {
          list.appendChild(
            el("div", "dirpicker-hint", "Listing truncated at 500 folders."),
          );
        }
      } catch {
        list.textContent = "";
        list.appendChild(el("div", "dirpicker-hint", "Network failure while listing folders."));
        toast("Network failure while listing folders.", "error");
      }
    }

    function dirpickerOpen() {
      $("#dirpicker").hidden = false;
      dirpickerLoad(null); // always starts at the hub's home directory
    }

    function dirpickerClose() {
      $("#dirpicker").hidden = true;
    }

    // =====================================================================
    // Bootstrap
    // =====================================================================

    async function loadHealth() {
      try {
        const res = await fetch("/api/health");
        if (!res.ok) return;
        const data = await res.json();
        const serverSeconds = data.uptime || 0;
        // The server floors uptime while the local ticker carries the sub-second
        // fraction, so re-anchoring on every poll makes the counter visibly tick
        // backward ~1s. Only re-anchor when the drift is meaningful (clock skew,
        // or a hub restart that legitimately resets uptime downward); otherwise
        // let the smooth 1s ticker keep running monotonically.
        const local = state.uptimeBase
          ? state.uptimeBase.seconds + (Date.now() - state.uptimeBase.at) / 1000
          : null;
        if (local == null || Math.abs(local - serverSeconds) > 2) {
          state.uptimeBase = { seconds: serverSeconds, at: Date.now() };
        }
        $("#version").textContent = data.version || "—";
        renderUptime();
      } catch {
        // health poll failure is non-fatal; SSE state already reflects trouble.
      }
    }

    async function loadAgents() {
      const res = await fetch("/api/agents");
      const list = await res.json();
      for (const agent of list) mergeAgent(agent);
    }

    async function loadMessages() {
      const res = await fetch("/api/messages?limit=200");
      const list = await res.json(); // newest-first
      state.messages = Array.isArray(list) ? list : [];
      state.msgIds = new Set(state.messages.map((m) => m.id));
    }

    function setupMcpCommand() {
      const cmd = `claude mcp add --transport http --scope user switchboard ${location.origin}/mcp`;
      const code = $("#mcp-cmd");
      code.textContent = cmd;
      code.title = cmd;
      $("#copy-mcp").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(cmd);
          toast("Command copied.", "ok", 2000);
        } catch {
          // Fallback for contexts where the async clipboard API is blocked.
          const ta = document.createElement("textarea");
          ta.value = cmd;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            toast("Command copied.", "ok", 2000);
          } catch {
            toast("Could not copy automatically — select and copy.", "warn");
          }
          ta.remove();
        }
      });
    }

    async function boot() {
      setupMcpCommand();

      // Composer wiring.
      $("#composer").addEventListener("submit", sendMessage);
      $("#composer-body").addEventListener("keydown", (ev) => {
        if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
          ev.preventDefault();
          $("#composer").requestSubmit();
        }
      });
      $("#filter-clear").addEventListener("click", () => setFilter(state.filter));

      // Launcher wiring. The name field sanitizes as you type for the same
      // reason rename does — it feeds the same ^[a-z0-9][a-z0-9-]{1,30}$ hub rule.
      $("#launcher").addEventListener("submit", launchAgent);
      bindAgentNameSanitizer($("#launch-name"));

      // Dir picker wiring (the launcher form's "Browse…" panel).
      $("#dirpicker-browse").addEventListener("click", dirpickerOpen);
      $("#dirpicker-close").addEventListener("click", dirpickerClose);
      $("#dirpicker-select").addEventListener("click", () => {
        if (dirpickerState.path) $("#launch-dir").value = dirpickerState.path;
        dirpickerClose();
      });
      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape" && !$("#dirpicker").hidden) dirpickerClose();
      });

      // Bootstrap snapshot (agents + messages + health) BEFORE the live stream,
      // so the SSE only ever adds to a populated view (PRD Phase 6 behavior).
      try {
        await Promise.all([loadHealth(), loadAgents(), loadMessages()]);
      } catch (err) {
        toast("Failed to load the Hub's initial state.", "error");
      }
      renderAgents();
      renderRecipients();
      renderFilterBar();
      renderFeed();

      connectSse();

      // Local uptime ticker (1s) resynced by the periodic /api/health poll.
      setInterval(renderUptime, 1000);
      setInterval(loadHealth, 15000);
    }

    boot();
  </script>
</body>
</html>
