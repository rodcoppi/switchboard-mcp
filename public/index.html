      input.spellcheck = false;
      input.maxLength = 31; // the hub's rule: ^[a-z0-9][a-z0-9-]{1,30}$
      input.title = "New name — Enter to confirm, Esc to cancel";
      input.setAttribute("aria-label", `New name for agent ${agent.name}`);

      let done = false;
      function restore() {
        if (done) return true;
        done = true;
        input.replaceWith(nameEl);
        return false;
      }
      function confirm() {
        // Full sanitize (edge hyphens included): the input already shows the
        // sanitized text, this only settles a trailing hyphen left mid-typing.
        const next = sanitizeAgentNameInput(input.value, false);
        if (restore()) return;
        // Unchanged / emptied → the hub is not worth a round trip.
        if (next === "" || next === agent.name) return;
        renameAgent(agent.name, next);
      }

      // The card itself toggles the feed filter on click — never let the
      // editing interaction reach it.
      input.addEventListener("click", (ev) => ev.stopPropagation());
      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") confirm();
        else if (ev.key === "Escape") restore();
      });
      input.addEventListener("blur", restore);
      bindAgentNameSanitizer(input);

      nameEl.replaceWith(input);
      input.focus();
      input.select();
    }

    async function renameAgent(name, next) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/rename`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name: next }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(`Rename failed: ${body.error || `HTTP ${res.status}`}`, "warn");
          return;
        }
        // The SSE pair (agent_removed + agent_updated) also arrives; applying
        // it locally keeps the UI snappy for the click's own tab.
        dropAgent(name);
        mergeAgent(body.agent);
        renderAgents();
        toast(`Agent "${name}" renamed to "${body.agent.name}" (history kept).`);
      } catch (err) {
        toast(`Rename failed: ${err && err.message ? err.message : err}`, "warn");
      }
    }

    // =====================================================================
    // Groups panel — one place that shows every room and who is in it.
    // A group holds several agents, so managing it one text field per card
    // meant you could never see the rooms, rename one, or put a second agent
    // into one without retyping the name from memory.
    // =====================================================================

    // Groups with no agent in them yet. The hub only knows a group because an
    // agent is in it, so a group you just created has nowhere to live until you
    // move someone in — it is kept here, in the page, so it can appear in the
    // pickers meanwhile. Nothing is lost on reload but an empty room.
    const draftGroups = new Set();

    function openGroups(focusAgent) {
      $("#groups-box").hidden = false;
      renderGroupsPanel();
      if (focusAgent) {
        const sel = document.querySelector(`.groups-member select[data-agent="${focusAgent}"]`);
        if (sel) sel.focus();
      }
    }

    function closeGroups() {
      $("#groups-box").hidden = true;
      draftGroups.clear(); // an empty group nobody joined was never real
    }

    function panelGroups() {
      return [...new Set([...allGroups(), ...draftGroups])].sort();
    }

    function renderGroupsPanel() {
      const body = $("#groups-body");
      body.textContent = "";
      const groups = panelGroups();

      for (const group of groups) {
        const members = sortedAgents().filter((a) => groupOf(a) === group);
        const box = el("div", "groups-group");

        const head = el("div", "groups-group-head");
        head.append(
          el("span", "groups-group-name", group),
          el("span", "groups-group-count", members.length === 1 ? "1 agent" : `${members.length} agents`),
        );
        // Renaming a group renames it for everyone in it, in one write.
        const rename = el("button", "groups-rename", "rename");
        rename.type = "button";
        rename.title = `Rename "${group}" — every agent in it moves along`;
        rename.addEventListener("click", () => startGroupRename(group, head, rename));
        if (members.length > 0) head.appendChild(rename);
        box.appendChild(head);

        if (members.length === 0) {
          box.appendChild(
            el("div", "groups-empty", "Nobody here yet — move an agent in with the pickers below."),
          );
        }
        for (const agent of members) box.appendChild(buildGroupMemberRow(agent, groups));
        body.appendChild(box);
      }

      // Agents whose group has no box yet cannot happen (every group comes from
      // its agents), so nothing else to render.
      if (groups.length === 0) {
        body.appendChild(el("div", "groups-empty", "No agents registered yet."));
      }
    }

    function buildGroupMemberRow(agent, groups) {
      const row = el("div", "groups-member");
      row.appendChild(buildAvatar(agent.name));
      row.appendChild(el("span", "name", agent.name));
      row.appendChild(el("span", "role", agent.role || ""));

      // A picker, not a text field: the rooms already exist, so choosing beats
      // spelling one from memory. "New group…" is the escape hatch.
      const sel = el("select");
      sel.dataset.agent = agent.name;
      sel.title = `Which group ${agent.name} talks in`;
      for (const group of groups) {
        const opt = el("option", null, group);
        opt.value = group;
        if (group === groupOf(agent)) opt.selected = true;
        sel.appendChild(opt);
      }
      const newOpt = el("option", null, "new group…");
      newOpt.value = "__new__";
      sel.appendChild(newOpt);

      sel.addEventListener("change", () => {
        if (sel.value === "__new__") {
          sel.value = groupOf(agent); // undo the visual pick until one is typed
          $("#groups-new").focus();
          return;
        }
        if (sel.value !== groupOf(agent)) moveAgentToGroup(agent.name, sel.value);
      });
      row.appendChild(sel);
      return row;
    }

    /** Inline rename of a group, in the group's own header — where its name is. */
    function startGroupRename(group, head, trigger) {
      const nameEl = head.querySelector(".groups-group-name");
      const input = el("input", "agent-rename-input");
      input.type = "text";
      input.value = group;
      input.spellcheck = false;
      input.maxLength = 31;
      input.title = "Group name — Enter to confirm, Esc to cancel";

      let done = false;
      function restore() {
        if (done) return true;
        done = true;
        input.replaceWith(nameEl);
        trigger.hidden = false;
        return false;
      }
      function confirm() {
        const next = sanitizeAgentNameInput(input.value, false);
        if (restore()) return;
        if (next === "" || next === group) return;
        renameGroup(group, next);
      }

      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") confirm();
        else if (ev.key === "Escape") restore();
      });
      input.addEventListener("blur", restore);
      bindAgentNameSanitizer(input);

      trigger.hidden = true;
      nameEl.replaceWith(input);
      input.focus();
      input.select();
    }

    async function renameGroup(group, next) {
      try {
        const res = await fetch(`/api/groups/${encodeURIComponent(group)}/rename`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name: next }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(`Could not rename the group: ${body.error || `HTTP ${res.status}`}`, "warn");
          renderGroupsPanel();
          return;
        }
        for (const agent of body.agents) mergeAgent(agent);
        if (state.group === group) state.group = next; // keep reading the same room
        renderAgents();
        renderFeed();
        renderGroupsPanel();
        toast(`Group "${group}" is now "${next}" (${body.agents.length} agent(s) moved).`);
      } catch (err) {
        toast(`Could not rename the group: ${err && err.message ? err.message : err}`, "warn");
      }
    }

    // =====================================================================
    // The agent's screen. tmux tees the pane's bytes to the hub, the hub
    // relays them over SSE, xterm.js paints them; keystrokes go back the same
    // way. No node-pty and no websocket: tmux is already the pty, SSE is
    // already a stream, and the agent outlives this tab because the session
    // belongs to tmux, not to the dashboard.
    // =====================================================================

    const screenState = { name: null, term: null, fit: null, sse: null, ro: null };

    // Groups folded away in the rail. Page-local on purpose: which projects you
    // have collapsed right now is a view, not something the hub should store.
    const collapsedGroups = new Set();

    // Agents with a tab open, in the order you opened them. Only the ACTIVE one
    // streams: a tab you are not looking at does not need a live terminal, and
    // re-attaching costs a 2ms capture-pane — the pane has no scrollback to lose
    // (Claude Code redraws its own), so the switch is invisible.
    const openTabs = [];

    function renderTabs() {
      const strip = $("#tab-strip");
      strip.textContent = "";
      for (const name of openTabs) {
        const agent = state.agents.get(name);
        const tab = el("button", `tab${screenState.name === name ? " active" : ""}`);
        tab.type = "button";
        tab.title = agent ? `${name} — ${agent.role || "no role"}` : name;
        tab.append(
          el("span", `dot ${agent && agent.status === "online" ? "online" : "offline"}`),
          el("span", "name", name),
        );
        if (agent && agent.unreadCount > 0) {
          tab.appendChild(el("span", "tab-unread", String(agent.unreadCount)));
        }
        tab.addEventListener("click", () => openScreen(name));

        const close = el("button", "tab-close", "✕");
        close.type = "button";
        close.title = `Close the ${name} tab`;
        close.addEventListener("click", (ev) => {
          ev.stopPropagation();
          closeTab(name);
        });
        tab.appendChild(close);
        strip.appendChild(tab);
      }
      $("#tab-messages").classList.toggle("active", screenState.name === null);
    }

    function closeTab(name) {
      const i = openTabs.indexOf(name);
      if (i !== -1) openTabs.splice(i, 1);
      // Closing the tab you are looking at lands you on its neighbour, the way
      // a browser does — not on a blank panel.
      if (screenState.name === name) {
        const next = openTabs[i] || openTabs[i - 1];
        if (next) openScreen(next);
        else closeScreen();
      } else {
        renderTabs();
      }
    }

    function openScreen(name) {
      if (screenState.name === name) return;
      closeScreen({ keepTabs: true });
      screenState.name = name;
      if (!openTabs.includes(name)) openTabs.push(name);

      // The whole Messages panel steps aside, header and filter bar included.
      // Leaving "MESSAGES" labelling an agent's terminal was a lie.
      $("#feed").hidden = true;
      $(".feed-head").hidden = true;
      $("#filter-bar").hidden = true;
      $("#screen").hidden = false;
      $("#screen-name").textContent = name;
      setScreenHint("live — type here to drive it", false);

      const term = new Terminal({
        convertEol: false,
        cursorBlink: true,
        // The pane has NO scrollback of its own — Claude Code runs in the
        // alternate screen (tmux reports history_size 0), and the conversation
        // you page through lives in Claude Code's own buffer, which redraws the
        // screen when you scroll it. So xterm must NOT keep a scrollback and
        // must NOT eat PageUp/PageDown to scroll one: those keys belong to the
        // agent, exactly as in a real terminal window. Verified: PageUp
        // (1b 5b 35 7e) sent as raw bytes scrolls Claude Code's history.
        scrollback: 0,
        fontFamily: getComputedStyle(document.body).getPropertyValue("--mono").trim(),
        fontSize: SCREEN_FONT_PX,
        theme: {
          background: "#070b10",
          foreground: "#e6edf3",
          cursor: "#f5a623",
          selectionBackground: "rgba(245,166,35,0.3)",
        },
      });
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open($("#screen-term"));
      screenState.term = term;
      screenState.fit = fit;

      // Keystrokes → the pane. xterm hands us exactly the bytes a real terminal
      // would send (Escape is "\x1b", Ctrl-C is "\x03"), so they go over as
      // base64 and reach tmux as those same bytes.
      term.onData((data) => sendScreenInput(name, data));

      // The panel drives the size: measure what it can hold and tell the server
      // to size the tmux window to it. Once now (so the first frame lands at the
      // right grid), then on every panel resize.
      const ro = new ResizeObserver(() => scheduleScreenFit());
      ro.observe($("#screen-term"));
      screenState.ro = ro;
      pushScreenSize();

      const sse = new EventSource(`/api/agents/${encodeURIComponent(name)}/terminal`);
      sse.onmessage = (ev) => {
        let parsed;
        try {
          parsed = JSON.parse(ev.data);
        } catch {
          return;
        }
        if (parsed.error) {
          setScreenHint(parsed.error, true);
          return;
        }
        // The grid the server settled on. Match the local emulator to it — the
        // server DICTATES the window size to fit our panel (see pushScreenSize),
        // so this is the size we asked for, echoed back. Native font, no
        // scaling: the terminal is exactly as crisp as a real one.
        if (typeof parsed.cols === "number") {
          if (term.cols !== parsed.cols || term.rows !== parsed.rows) {
            term.resize(parsed.cols, parsed.rows);
          }
          setScreenHint("live — type here to drive it", false);
          return;
        }
        // atob → bytes → xterm. The stream is raw terminal output, so it is
        // fed as bytes; letting the browser decode it as text would mangle
        // every escape sequence and any UTF-8 split across two chunks.
        const bin = atob(parsed.b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        term.write(bytes);
      };
      sse.onerror = () => setScreenHint("reconnecting…", true);
      screenState.sse = sse;
      term.focus();
      renderAgents(); // the rail marks which agent is on screen
      renderTabs();
    }

    /**
     * Leaves the screen and shows Messages. keepTabs is for switching BETWEEN
     * agents: the terminal is torn down and rebuilt, but the tab strip is not
     * the terminal — closing tabs on every switch would be a different feature.
     */
    function closeScreen(opts) {
      if (screenState.sse) screenState.sse.close();
      if (screenState.ro) screenState.ro.disconnect();
      if (screenState.term) screenState.term.dispose();
      screenState.sse = screenState.ro = screenState.term = screenState.fit = null;
      const had = screenState.name;
      screenState.name = null;
      $("#screen").hidden = true;
      $("#screen-term").textContent = "";
      // Mid-switch: openScreen is about to show the next agent, so leaving
      // Messages visible for that instant would just flash the transcript.
      if (opts && opts.keepTabs) return;
      $("#feed").hidden = false;
      $(".feed-head").hidden = false;
      $("#filter-bar").hidden = false;
      renderFilterBar(); // it owns its own visibility
      if (had) renderAgents();
      renderTabs();
    }

    function setScreenHint(text, bad) {
      const hint = $("#screen-hint");
      hint.textContent = text;
      hint.classList.toggle("stale", !!bad);
    }

    // Native font, fixed. The dashboard tells the server what grid its panel
    // wants and the server sizes the tmux window to match, so the terminal
    // renders at its true size — no scaling, no soft text. This is what the
    // earlier "mirror and scale" approach failed to be.
    const SCREEN_FONT_PX = 14;

    let fitTimer = null;
    function scheduleScreenFit() {
      // Debounced: a drag fires ResizeObserver dozens of times, and each fit is
      // a tmux resize-window on the other end.
      clearTimeout(fitTimer);
      fitTimer = setTimeout(pushScreenSize, 120);
    }

    /**
     * Measures the grid the panel can hold at the native font and asks the
     * server to size the tmux window to it. proposeDimensions() is xterm's own
     * fit computation; the window then reflows and echoes the grid back, which
     * the stream handler applies with term.resize.
     */
    async function pushScreenSize() {
      const { name, term, fit } = screenState;
      if (!name || !term || !fit) return;
      const dims = fit.proposeDimensions();
      if (!dims || !dims.cols || !dims.rows) return;
      try {
        await fetch(`/api/agents/${encodeURIComponent(name)}/terminal/resize`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ cols: dims.cols, rows: dims.rows }),
        });
      } catch {
        /* the size is cosmetic; a failed resize must not break the stream */
      }
    }

    async function sendScreenInput(name, data) {
      // btoa needs latin1; the string xterm gives us is already byte-per-char
      // for control codes, and unescape(encodeURIComponent(..)) turns anything
      // typed (accents included) into its UTF-8 bytes first.
      const b64 = btoa(unescape(encodeURIComponent(data)));
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/terminal/input`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ b64 }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          // The pane guard refusing is the loudest case: it means this pane is
          // a shell, and typing into it would run commands.
          setScreenHint(body.error || `Could not send input (HTTP ${res.status}).`, true);
        }
      } catch (err) {
        setScreenHint(`Could not send input: ${err && err.message ? err.message : err}`, true);
      }
    }

    async function moveAgentToGroup(name, group) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/group`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ group }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(`Could not move the agent: ${body.error || `HTTP ${res.status}`}`, "warn");
          return;
        }
        // agent_updated arrives over SSE too; applying it here keeps the
        // clicking tab snappy.
        mergeAgent(body.agent);
        draftGroups.delete(group); // it has a member now, so the hub knows it
        renderAgents();
        renderFeed(); // the transcript is filtered by group — the card just moved
        if (!$("#groups-box").hidden) renderGroupsPanel();
        toast(`"${name}" is now in the ${group} group.`);
      } catch (err) {
        toast(`Could not move the agent: ${err && err.message ? err.message : err}`, "warn");
      }
    }

    async function removeAgent(name) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}`, {
          method: "DELETE",
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          toast(`Remove failed: ${body.error || `HTTP ${res.status}`}`, "warn");
          return;
        }
        // The SSE agent_removed event also arrives; removing locally keeps the
        // UI snappy for the click's own tab.
        dropAgent(name);
        toast(`Agent "${name}" removed from the registry (messages kept).`);
      } catch (err) {
        toast(`Remove failed: ${err && err.message ? err.message : err}`, "warn");
      }
    }

    function dropAgent(name) {
      // state.agents is a Map (name -> agent), not an array.
      if (!state.agents.delete(name)) return;
      if (state.filter === name) state.filter = null;
      renderAgents();
      renderFeed();
    }

    // Group broadcast records (same broadcastId) into one visual row; single
    // messages stay one row. state.messages is newest-first (the API's order,
    // and unshift keeps it), but a transcript reads like a conversation —
    // oldest at the top, the newest at the bottom where you are looking — so
    // it is walked backwards here. Day dividers are inserted on the way.
    function feedRows() {
      const filter = state.filter;
      const seen = new Set();
      const rows = [];
      let day = null;

      for (let i = state.messages.length - 1; i >= 0; i--) {
        const m = state.messages[i];
        if (state.group && messageGroup(m) !== state.group) continue;
        let row;
        if (m.broadcastId) {
          if (seen.has(m.broadcastId)) continue;
          seen.add(m.broadcastId);
          const group = state.messages.filter((x) => x.broadcastId === m.broadcastId);
          if (filter && !group.some((x) => x.from === filter || x.to === filter)) continue;
          row = { kind: "broadcast", group };
        } else {
          if (filter && m.from !== filter && m.to !== filter) continue;
          row = { kind: "single", msg: m };
        }
        const stamp = startOfDay(new Date(m.createdAt));
        if (stamp !== day) {
          day = stamp;
          rows.push({ kind: "day", label: fmtDayLabel(m.createdAt) });
        }
        rows.push(row);
      }
      return rows;
    }

    function renderFeed() {
      const feed = $("#feed");
      // A transcript must not yank itself out from under someone reading back
      // through history: follow the newest only when they are already at the
      // bottom (or the feed is fresh and has no scroll yet).
      const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;

      feed.textContent = "";
      const rows = feedRows();
      if (rows.length === 0) {
        feed.appendChild(
          el(
            "div",
            "empty-hint",
            state.filter
              ? `No messages involving "${state.filter}".`
              : "No messages yet. Anything your agents say to each other shows up here.",
          ),
        );
        return;
      }
      for (const row of rows) {
        if (row.kind === "day") feed.appendChild(el("div", "day-divider", row.label));
        else feed.appendChild(row.kind === "broadcast" ? buildBroadcastRow(row.group) : buildMsgRow(row.msg));
      }

      clampOverflowingBodies(feed);
      if (atBottom) feed.scrollTop = feed.scrollHeight;
    }

    /**
     * Hides the tail of any body taller than the clamp, behind a "Show more".
     *
     * Bodies are built already clamped, because overflow can only be measured
     * against the clamp — then the ones that FIT have it taken back off. They
     * must: the clamp carries a fade mask, and a mask on a body that never
     * overflowed just dims its last line for no reason (a two-line message
     * came out looking struck through).
     *
     * One read pass over the finished feed, one write pass after it —
     * interleaving them would force a reflow per bubble.
     */
    function clampOverflowingBodies(feed) {
      const bodies = feed.querySelectorAll(".msg-body");
      const overflowing = [];
      const fitting = [];
      for (const body of bodies) {
        // reads only
        (body.scrollHeight > body.clientHeight + 4 ? overflowing : fitting).push(body);
      }
      for (const body of fitting) body.classList.remove("clamped");
      for (const body of overflowing) {
        const more = el("button", "msg-more", "Show more");
        more.type = "button";
        more.addEventListener("click", (ev) => {
          ev.stopPropagation();
          const collapsed = body.classList.toggle("clamped");
          more.textContent = collapsed ? "Show more" : "Show less";
        });
        body.after(more);
      }
    }

    /** "alpha to beta" — a sentence, not a diagram. */
    function buildMetaLine(from, to, opts) {
      const meta = el("div", "msg-meta");
      meta.append(
        el("span", `msg-from${from === "operator" ? " operator" : ""}`, from),
        el("span", "msg-rel", "to"),
        el("span", `msg-to${to === "everyone" ? " all" : ""}`, to),
      );
      if (opts && opts.extra) meta.appendChild(opts.extra);
      return meta;
    }

    function buildAvatar(name) {
      const av = el("div", "msg-avatar", monogram(name));
      av.style.background = name === "operator" ? "var(--accent)" : agentHue(name);
      av.title = name;
      return av;
    }

    function buildFoot(createdAt, flag) {
      const foot = el("div", "msg-foot");
      const time = el("span", "msg-time", fmtTime(createdAt));
      time.title = fmtFull(createdAt);
      foot.append(time, flag);
      return foot;
    }

    function buildBubble(from, to, body, createdAt, flag, extra) {
      const bubble = el("div", "msg-bubble");
      bubble.appendChild(buildMetaLine(from, to, { extra }));
      bubble.appendChild(el("div", "msg-body clamped", body));
      bubble.appendChild(buildFoot(createdAt, flag));
      return bubble;
    }

    function buildMsgRow(m) {
      const row = el("div", "msg-row");
      row.classList.add(m.readAt ? "read" : "unread");
      if (m.from === "operator") row.classList.add("from-operator");
      const flag = m.readAt
        ? Object.assign(el("span", "msg-read-flag read", "✓ read"), { title: fmtFull(m.readAt) })
        : el("span", "msg-read-flag pending", "• unread");
      row.appendChild(buildAvatar(m.from));
      row.appendChild(buildBubble(m.from, m.to, m.body, m.createdAt, flag));
      return row;
    }

    function buildBroadcastRow(group) {
      // All records of a broadcast share from + body; each has its own to/readAt.
      const first = group[0];
      const row = el("div", "msg-row broadcast");
      if (first.from === "operator") row.classList.add("from-operator");
      const readCount = group.filter((x) => x.readAt).length;
      const flag = el(
        "span",
        `msg-read-flag ${readCount === group.length ? "read" : "pending"}`,
        `read by ${readCount} of ${group.length}`,
      );
      flag.title = group.map((x) => `${x.to}: ${x.readAt ? "read" : "unread"}`).join(" · ");
      const extra = el("span", "msg-rel", `(${group.length} agents)`);
      row.appendChild(buildAvatar(first.from));
      row.appendChild(buildBubble(first.from, "everyone", first.body, first.createdAt, flag, extra));
      return row;
    }

    /** The datalist behind the launcher's group field: the rooms you have. */
    function renderGroupOptions() {
      const list = $("#group-options");
      list.textContent = "";
      for (const group of allGroups()) {
        const opt = el("option");
        opt.value = group;
        list.appendChild(opt);
      }
    }

    function renderFilterBar() {
      const bar = $("#filter-bar");
      if (state.filter) {
        bar.classList.add("active");
        $("#filter-target").textContent = state.filter;
      } else {
        bar.classList.remove("active");
        $("#filter-target").textContent = "";
      }
    }

    function setFilter(name) {
      state.filter = state.filter === name ? null : name;
      renderFilterBar();
      renderFeed();
      // Re-render cards so the .active highlight follows the filter.
      for (const card of document.querySelectorAll(".agent-card")) {
        card.classList.toggle("active", card.dataset.name === state.filter);
      }
    }

    // =====================================================================
    // SSE handling
    // =====================================================================

    // Long-session hygiene: the server caps GET /api/messages at limit=200, but
    // the live stream unshifts forever. Bound the in-memory window so a
    // long-lived tab on a busy hub doesn't grow unbounded and feedRows() (O(n)
    // per broadcast) doesn't slow down with session length.
    const MAX_MESSAGES = 1000;

    function onMessageCreated(m) {
      if (state.msgIds.has(m.id)) return; // dedup vs bootstrap / our own POST
      state.msgIds.add(m.id);
      state.messages.unshift(m);
      if (state.messages.length > MAX_MESSAGES) {
        const dropped = state.messages.splice(MAX_MESSAGES);
        for (const d of dropped) state.msgIds.delete(d.id);
      }
      const recipient = state.agents.get(m.to);
      if (recipient) {
        recipient.unreadCount = (recipient.unreadCount || 0) + 1;
        renderAgents();
      }
      renderFeed();
    }

    // A read can reference a message outside our loaded window (older than the
    // bootstrap limit, or created during a disconnect gap): the per-message
    // delta can't apply, so pull the authoritative unreadCount from /api/agents
    // instead of letting the recipient's badge drift upward. Guarded so a burst
    // of such reads can't stampede the endpoint.
    let agentsRefetchInFlight = false;
    function refetchAgentsAuthoritative() {
      if (agentsRefetchInFlight) return;
      agentsRefetchInFlight = true;
      loadAgents()
        .then(() => {
          renderAgents();
        })
        .catch(() => {
          /* non-fatal: nudge_sent resync and the next reconnect reconcile too */
        })
        .finally(() => {
          agentsRefetchInFlight = false;
        });
    }

    function onMessageRead({ messageId, readAt }) {
      const m = state.messages.find((x) => x.id === messageId);
      if (!m) {
        refetchAgentsAuthoritative();
        return;
      }
      if (!m.readAt) {
        m.readAt = readAt;
        const recipient = state.agents.get(m.to);
        if (recipient) {
          recipient.unreadCount = Math.max(0, (recipient.unreadCount || 0) - 1);
          renderAgents();
        }
      }
      renderFeed();
    }

    function pulseNudge(name) {
      const btn = document.querySelector(`.nudge-btn[data-nudge-for="${CSS.escape(name)}"]`);
      if (!btn) return;
      btn.classList.remove("nudging");
      void btn.offsetWidth; // reflow to restart the animation
      btn.classList.add("nudging");
    }

    function onNudgeSent({ agent, at, unread }) {
      const a = state.agents.get(agent);
      if (a) {
        a.lastNudgeAt = at;
        // nudge_sent carries the authoritative unread at nudge time — resync.
        if (typeof unread === "number") a.unreadCount = unread;
        renderAgents();
      }
      pulseNudge(agent);
    }

    function handleSse(event) {
      switch (event.type) {
        case "agent_updated":
          mergeAgent(event.payload);
          renderAgents();
          break;
        case "message_created":
          onMessageCreated(event.payload);
          break;
        case "message_read":
          onMessageRead(event.payload);
          break;
        case "nudge_sent":
          onNudgeSent(event.payload);
          break;
        case "agent_removed":
          dropAgent(event.payload.name);
          break;
      }
    }

    // The stream carries NO event ids and the hub supports no Last-Event-ID
    // replay, so every event fired while we were disconnected (message_created,
    // message_read, agent_updated, nudge_sent) is lost. After ANY reconnect we
    // therefore reconcile the snapshot before trusting the stream again — this
    // mirrors the bootstrap ordering: loadMessages rebuilds state.messages +
    // msgIds and loadAgents refreshes the authoritative unreadCount, so the
    // stream once more only ever adds to a freshly reconciled view.
    let sseConnectedOnce = false;

    // The hub heartbeats every 25s, so silence past ~70s (three missed beats)
    // means the stream is dead rather than the network being quiet. EventSource
    // will not tell us: it only raises onerror when a socket visibly breaks, and
    // the way this one dies is invisible — the dashboard sits in a Windows
    // browser, the hub in WSL2, and WSL2's localhost proxy can drop the tunnel
    // (as can sleeping the laptop) with both ends still believing it is open.
    // The pill stayed green and the feed silently stopped until a reload.
    const SSE_SILENCE_LIMIT_MS = 70_000;
    let lastSseAt = 0;
    let sseWatchdog = null;

    function startSseWatchdog() {
      if (sseWatchdog) clearInterval(sseWatchdog);
      sseWatchdog = setInterval(() => {
        if (Date.now() - lastSseAt < SSE_SILENCE_LIMIT_MS) return;
        // Reopening resyncs through the onopen path, so nothing missed in the
        // gap stays missed.
        setConnState("reconnecting", "reconnecting");
        if (state.sse) state.sse.close();
        connectSse();
      }, 10_000);
    }

    function connectSse() {
      const es = new EventSource("/api/events");
      state.sse = es;
      lastSseAt = Date.now();
      startSseWatchdog();
      es.onopen = () => {
        lastSseAt = Date.now();
        if (!sseConnectedOnce) {
          // First connect: boot() already fetched the snapshot, so just go live
          // (re-fetching here would be a harmless duplicate, but we skip it).
          sseConnectedOnce = true;
          setConnState("live", "live");
          return;
        }
        // Reconnect after a gap (hub restart, laptop sleep/wake, socket drop):
        // resync before flipping the pill back to "live", so the header never
        // claims freshness over a view that silently missed events.
        Promise.all([loadAgents(), loadMessages()])
          .then(() => {
            renderAgents();
            renderFeed();
          })
          .catch(() => {
            toast("Failed to resync after reconnection.", "warn");
          })
          .finally(() => setConnState("live", "live"));
      };
      es.onmessage = (ev) => {
        lastSseAt = Date.now(); // any frame, heartbeat included, proves it lives
        let parsed;
        try {
          parsed = JSON.parse(ev.data);
        } catch {
          return; // malformed frame
        }
        if (parsed.type === "heartbeat") return; // its only job is the timestamp above
        handleSse(parsed);
      };
      // EventSource reconnects on its own; we only surface the state so the
      // operator knows the feed is stale until it recovers.
      es.onerror = () => setConnState("reconnecting", "reconnecting");
    }

    // =====================================================================
    // Actions (REST)
    // =====================================================================

    async function toggleMute(name, muted) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/mute`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ muted }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to change mute (HTTP ${res.status}).`, "error");
          return;
        }
        mergeAgent(data.agent); // agent_updated will also arrive via SSE
        renderAgents();
        toast(`${name} ${muted ? "muted" : "unmuted"}.`, "ok");
      } catch {
        toast("Network failure while changing mute.", "error");
      }
    }

    async function forceNudge(name) {
      try {
        const res = await fetch(`/api/agents/${encodeURIComponent(name)}/nudge`, {
          method: "POST",
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          pulseNudge(name);
          toast(`Nudge sent to ${name}.`, "ok");
          return;
        }
        // 409 (unsafe pane / dead session), 404 (unknown), 501 (no
        // dispatcher). The hub message is already friendly — show it without breaking.
        toast(data.error || `Nudge not delivered to ${name} (HTTP ${res.status}).`, "warn");
      } catch {
        toast("Network failure while nudging.", "error");
      }
    }

    // Launch an agent from the dashboard: the hub creates the tmux session
    // running claude (POST /api/agents/launch). Success is confirmed by a
    // toast; the new agent card arrives via the agent_updated SSE. The hub
    // settles the session before answering (~2.5s, ~5s with the resume
    // fallback), so the button shows a busy state meanwhile. All feedback goes
    // through toast() → textContent (server data never touches innerHTML).
    /** The Claude|Codex segmented control's value (radios — one is always on). */
    function selectedAgentType() {
      const checked = document.querySelector('#launch-agent input[name="agentType"]:checked');
      return checked && checked.value === "codex" ? "codex" : "claude";
    }

    function closeLauncher() {
      $("#launcher-box").hidden = true;
      dirpickerClose();
      for (const id of ["#launch-dir", "#launch-name", "#launch-role", "#launch-group"]) {
        $(id).value = "";
      }
    }

    async function launchAgent(ev) {
      ev.preventDefault();
      const dir = $("#launch-dir").value.trim();
      if (dir.length === 0) {
        toast("Directory is required: the absolute path the agent should work in.", "warn");
        return;
      }
      const name = $("#launch-name").value.trim();
      const role = $("#launch-role").value.trim();
      // Empty → the hub decides: it keeps the group of an agent coming back, and
      // puts a brand new one in the default group. Sending "" would be a claim.
      const group = $("#launch-group").value.trim();
      const btn = $("#launch-btn");
      const prevLabel = btn.textContent;
      btn.disabled = true;
      btn.textContent = "launching…";
      try {
        // openTerminal: a launched agent should be VISIBLE — a Windows window
        // pops attached to its session (owner feedback; best-effort hub-side).
        const payload = {
          dir,
          continue: $("#launch-continue").checked,
          openTerminal: true,
          agentType: selectedAgentType(),
        };
        if (name) payload.name = name;
        if (role) payload.role = role;
        if (group) payload.group = group;
        const res = await fetch("/api/agents/launch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to launch (HTTP ${res.status}).`, "error", 8000);
          return;
        }
        const agentName = data.agent && data.agent.name ? data.agent.name : name || dir;
        if (data.fallback) {
          toast(
            `No resumable conversation in ${dir} — opened a fresh session for ${agentName}.`,
            "warn",
            7000,
          );
        }
        toast(
          `Agent ${agentName} launched` +
            `${data.replaced ? " (replaced its previous session)" : ""}` +
            `${data.terminalOpened ? " — its window is opening" : ""}. ` +
            `The kickoff will instruct it to join.`,
          "ok",
        );
        closeLauncher(); // it launched; the form has nothing left to say
        // No render here: the agent card arrives via the agent_updated SSE.
      } catch {
        toast("Network failure while launching.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = prevLabel;
      }
    }

    // =====================================================================
    // Dir picker — the launcher form's "Browse…" panel
    // =====================================================================
    // Lists the hub machine's directories via GET /api/fs/dirs (directory
    // NAMES only) so the operator picks the working folder by click instead
    // of typing a POSIX path (Windows Explorer paths pasted into the input
    // are translated server-side either way). Every server value rendered
    // here (paths, folder names) goes through el()/textContent — never
    // innerHTML (same XSS rule as the rest of this file).

    const dirpickerState = { path: null };

    async function dirpickerLoad(targetPath) {
      const list = $("#dirpicker-list");
      list.textContent = "";
      list.appendChild(el("div", "dirpicker-hint", "loading…"));
      try {
        // No path → the hub answers with its home directory.
        const url = targetPath
          ? `/api/fs/dirs?path=${encodeURIComponent(targetPath)}`
          : "/api/fs/dirs";
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        list.textContent = "";
        if (!res.ok || !data.ok) {
          toast(data.error || `Failed to list folders (HTTP ${res.status}).`, "error");
          list.appendChild(el("div", "dirpicker-hint", "Could not open this folder."));
          return;
        }
        dirpickerState.path = data.path;
        const pathEl = $("#dirpicker-path");
        pathEl.textContent = data.path;
        pathEl.title = data.path;
        if (data.parent !== null) {
          const up = el("div", "dirpicker-entry dirpicker-up", "..");
          up.title = data.parent;
          up.addEventListener("click", () => dirpickerLoad(data.parent));
          list.appendChild(up);
        }
        for (const d of data.dirs) {
          const row = el("div", "dirpicker-entry");
          row.title = d.path;
          row.appendChild(el("span", "dirpicker-name", d.name));
          if (d.hasConversation) {
            const badge = el("span", "dirpicker-badge", "conversation");
            badge.title =
              "This folder has a previous Claude Code conversation " +
              "(resumable with “continue conversation”).";
            row.appendChild(badge);
          }
          row.addEventListener("click", () => dirpickerLoad(d.path));
          list.appendChild(row);
        }
        if (data.dirs.length === 0) {
          list.appendChild(el("div", "dirpicker-hint", "No subfolders."));
        }
        if (data.truncated) {
          list.appendChild(
            el("div", "dirpicker-hint", "Listing truncated at 500 folders."),
          );
        }
      } catch {
        list.textContent = "";
        list.appendChild(el("div", "dirpicker-hint", "Network failure while listing folders."));
        toast("Network failure while listing folders.", "error");
      }
    }

    /**
     * Browse… asks the hub to open the REAL Windows folder dialog — the one you
     * already know how to use. The page cannot open it itself: no browser gives
     * a page a folder's absolute path, so the hub opens it Windows-side and
     * reads the answer (see src/server/winpicker.ts).
     *
     * The built-in browser below is the fallback, for a machine with no Windows
     * to ask. Losing the native dialog must not cost you the ability to pick a
     * folder at all.
     */
    async function browseForFolder() {
      const btn = $("#dirpicker-browse");
      const prev = btn.textContent;
      btn.disabled = true;
      btn.textContent = "pick a folder…";
      try {
        const res = await fetch("/api/fs/pick", {
          method: "POST",
          headers: { "content-type": "application/json" },
          // Start where the form already points, so a second Browse resumes
          // where you were rather than at the top again.
          body: JSON.stringify({ startIn: $("#launch-dir").value.trim() || undefined }),
        });
        const body = await res.json();
        if (body.ok) {
          if (!body.cancelled) $("#launch-dir").value = body.path;
          return;
        }
        if (body.fallback) {
          toast(body.error, "warn");
          dirpickerOpen(); // still pick a folder, just not natively
          return;
        }
        toast(body.error || `Could not open the folder dialog (HTTP ${res.status}).`, "warn");
      } catch (err) {
        toast(`Could not open the folder dialog: ${err && err.message ? err.message : err}`, "warn");
        dirpickerOpen();
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    }

    function dirpickerOpen() {
      $("#dirpicker").hidden = false;
      dirpickerLoad(null); // always starts at the hub's home directory
    }

    function dirpickerClose() {
      $("#dirpicker").hidden = true;
    }

    // =====================================================================
    // Bootstrap
    // =====================================================================

    async function loadHealth() {
      try {
        const res = await fetch("/api/health");
        if (!res.ok) return;
        const data = await res.json();
        const serverSeconds = data.uptime || 0;
        // The server floors uptime while the local ticker carries the sub-second
        // fraction, so re-anchoring on every poll makes the counter visibly tick
        // backward ~1s. Only re-anchor when the drift is meaningful (clock skew,
        // or a hub restart that legitimately resets uptime downward); otherwise
        // let the smooth 1s ticker keep running monotonically.
        const local = state.uptimeBase
          ? state.uptimeBase.seconds + (Date.now() - state.uptimeBase.at) / 1000
          : null;
        if (local == null || Math.abs(local - serverSeconds) > 2) {
          state.uptimeBase = { seconds: serverSeconds, at: Date.now() };
        }
        $("#version").textContent = data.version || "—";
        renderUptime();
      } catch {
        // health poll failure is non-fatal; SSE state already reflects trouble.
      }
    }

    async function loadAgents() {
      const res = await fetch("/api/agents");
      const list = await res.json();
      for (const agent of list) mergeAgent(agent);
    }

    async function loadMessages() {
      const res = await fetch("/api/messages?limit=200");
      const list = await res.json(); // newest-first
      state.messages = Array.isArray(list) ? list : [];
      state.msgIds = new Set(state.messages.map((m) => m.id));
    }

    function setupMcpCommand() {
      const cmd = `claude mcp add --transport http --scope user switchboard ${location.origin}/mcp`;
      const code = $("#mcp-cmd");
      code.textContent = cmd;
      code.title = cmd;
      $("#copy-mcp").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(cmd);
          toast("Command copied.", "ok", 2000);
        } catch {
          // Fallback for contexts where the async clipboard API is blocked.
          const ta = document.createElement("textarea");
          ta.value = cmd;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            toast("Command copied.", "ok", 2000);
          } catch {
            toast("Could not copy automatically — select and copy.", "warn");
          }
          ta.remove();
        }
      });
    }

    async function boot() {
      setupMcpCommand();

      // Composer wiring.
      $("#filter-clear").addEventListener("click", () => setFilter(state.filter));

      // Launcher wiring. The name field sanitizes as you type for the same
      // reason rename does — it feeds the same ^[a-z0-9][a-z0-9-]{1,30}$ hub rule.
      $("#launcher").addEventListener("submit", launchAgent);
      bindAgentNameSanitizer($("#launch-name"));
      // A group name is an address too, under the same rule as an agent's, so
      // it gets the same treatment: typing "Chefe de Redes" reads back as
      // "chefe-de-redes" rather than bouncing off the hub.
      bindAgentNameSanitizer($("#launch-group"));

      // Messages: a tab like any other, so selecting it is closing the screen.
      $("#tab-messages").addEventListener("click", closeScreen);

      // Launch agent (lightbox).
      $("#launcher-open").addEventListener("click", () => {
        $("#launcher-box").hidden = false;
        $("#launch-dir").focus();
      });
      $("#launcher-close").addEventListener("click", closeLauncher);
      // Clicking the backdrop closes; clicking the card must not.
      $("#launcher-box").addEventListener("click", (ev) => {
        if (ev.target === $("#launcher-box")) closeLauncher();
      });

      // The agent's screen.
      $("#screen-close").addEventListener("click", closeScreen);
      $("#screen-window").addEventListener("click", (ev) => {
        if (screenState.name) openAgentTerminal(screenState.name, ev.currentTarget);
      });

      // Groups panel wiring.
      $("#groups-open").addEventListener("click", () => {
        if ($("#groups-box").hidden) openGroups();
        else closeGroups();
      });
      $("#groups-close").addEventListener("click", closeGroups);
      // Backdrop closes, the card does not — same contract as the launcher.
      $("#groups-box").addEventListener("click", (ev) => {
        if (ev.target === $("#groups-box")) closeGroups();
      });
      $("#groups-create").addEventListener("click", () => {
        const input = $("#groups-new");
        const name = sanitizeAgentNameInput(input.value, false);
        if (name === "") {
          toast("Name the group first — lowercase letters, digits and hyphens.", "warn");
          return;
        }
        if (panelGroups().includes(name)) {
          toast(`The group "${name}" already exists.`, "warn");
          return;
        }
        // The hub learns a group from the agents in it, so a new one is only a
        // box on screen until you move somebody into it.
        draftGroups.add(name);
        input.value = "";
        renderGroupsPanel();
        toast(`Group "${name}" is ready — move an agent into it to make it real.`);
      });
      bindAgentNameSanitizer($("#groups-new"));
      $("#groups-new").addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          $("#groups-create").click();
        }
      });

      // Dir picker wiring (the launcher form's "Browse…" panel).
      $("#dirpicker-browse").addEventListener("click", browseForFolder);
      $("#dirpicker-close").addEventListener("click", dirpickerClose);
      $("#dirpicker-select").addEventListener("click", () => {
        if (dirpickerState.path) $("#launch-dir").value = dirpickerState.path;
        dirpickerClose();
      });
      document.addEventListener("keydown", (ev) => {
        if (ev.key !== "Escape") return;
        // NOT the screen: Escape belongs to the agent while you are typing at
        // it (it is how you interrupt Claude Code), so it must reach the pane
        // rather than close the view. The ✕ and the card do that.
        if (!$("#dirpicker").hidden) dirpickerClose();
        else if (!$("#launcher-box").hidden) closeLauncher();
        else if (!$("#groups-box").hidden) closeGroups();
      });

      // Bootstrap snapshot (agents + messages + health) BEFORE the live stream,
      // so the SSE only ever adds to a populated view (PRD Phase 6 behavior).
      try {
        await Promise.all([loadHealth(), loadAgents(), loadMessages()]);
      } catch (err) {
        toast("Failed to load the Hub's initial state.", "error");
      }
      renderAgents();
      renderFilterBar();
      renderFeed();

      connectSse();

      // Local uptime ticker (1s) resynced by the periodic /api/health poll.
      setInterval(renderUptime, 1000);
      setInterval(loadHealth, 15000);
    }

    // WAIT for the DOM. This script sits in the middle of the body, so markup
    // below it does not exist yet when it runs — boot() wires listeners onto
    // ~50 elements and the first null threw, leaving the dashboard stuck on
    // "connecting" with a live hub and four agents behind it. Nothing errored
    // visibly; it just never started.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
  <!-- Groups: a lightbox, like the launcher. Both are things you MANAGE;
       the panel used to shove the transcript aside, which is what a view
       does, not a dialog. Two shapes for the same kind of action was the
       inconsistency. -->
  <div class="lightbox" id="groups-box" hidden>
    <div class="lightbox-card lightbox-card-wide">
        <div class="groups-panel" id="groups-panel">
          <div class="groups-head">
            <span class="eyebrow">Groups</span>
            <span class="groups-hint">An agent can only message agents in the same group.</span>
            <button class="dirpicker-close" id="groups-close" type="button"
              title="Close (Esc)">✕</button>
          </div>
          <div class="groups-body" id="groups-body"></div>
          <div class="groups-foot">
            <input class="launch-input groups-new-input" id="groups-new" spellcheck="false"
              placeholder="new group name" maxlength="31" />
            <button class="btn" id="groups-create" type="button"
              title="Create the group — then move agents into it above">Create group</button>
          </div>
        </div>
    </div>
  </div>

  <!-- Launch agent: a lightbox now. It used to own the bottom half of the rail
       permanently — a form you use once per project, sitting in the space the
       rail needs to be what it became: the list of agents you switch between. -->
  <div class="lightbox" id="launcher-box" hidden>
    <div class="lightbox-card">
      <div class="lightbox-head">
        <span class="eyebrow">Launch agent</span>
        <button class="dirpicker-close" id="launcher-close" type="button"
          title="Close (Esc)">✕</button>
      </div>
        <form class="launcher" id="launcher" autocomplete="off">
          <div class="launcher-title">Launch agent</div>
          <div>
            <label class="launcher-label" for="launch-dir">directory (absolute path)</label>
            <div class="launcher-dir-row">
              <input class="launch-input" id="launch-dir" name="dir"
                placeholder="/home/you/project — \\wsl$\… and C:\… accepted too"
                spellcheck="false" />
              <button class="btn dirpicker-browse" id="dirpicker-browse" type="button"
                title="Browse the WSL filesystem and pick a folder">Browse…</button>
            </div>
            <div class="dirpicker" id="dirpicker" hidden>
              <div class="dirpicker-head">
                <span class="dirpicker-path" id="dirpicker-path"></span>
                <button class="dirpicker-close" id="dirpicker-close" type="button"
                  title="Close (Esc)">✕</button>
              </div>
              <div class="dirpicker-list" id="dirpicker-list"></div>
              <div class="dirpicker-foot">
                <button class="dirpicker-select" id="dirpicker-select" type="button">
                  Use this folder
                </button>
              </div>
            </div>
          </div>
          <div class="launcher-grid">
            <div>
              <label class="launcher-label" for="launch-name">name</label>
              <input class="launch-input" id="launch-name" name="name"
                placeholder="defaults to folder name" spellcheck="false" />
            </div>
            <div>
              <label class="launcher-label" for="launch-role">role</label>
              <input class="launch-input" id="launch-role" name="role"
                placeholder="e.g. API backend" />
            </div>
          </div>
          <div>
            <label class="launcher-label" for="launch-group">group</label>
            <input class="launch-input" id="launch-group" name="group"
              list="group-options" spellcheck="false"
              placeholder="default — the agents it can talk to"
              title="An agent can only message agents in the same group. Type a new name to start a group, or pick one you already have." />
            <datalist id="group-options"></datalist>
          </div>
          <div class="launcher-row">
            <label class="launcher-label" for="launch-agent-claude">agent</label>
            <div class="launcher-segmented" id="launch-agent"
              title="Which coding agent CLI the hub opens in the tmux session.">
              <input type="radio" name="agentType" id="launch-agent-claude"
                value="claude" checked />
              <label class="launcher-segment" for="launch-agent-claude">
                <svg class="agent-logo" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17.3041 3.541h-3.6718l6.696 16.918H24Zm-10.6082 0L0 20.459h3.7442l1.3693-3.5527h7.0052l1.3693 3.5527h3.7442L10.5363 3.541Zm-.3712 10.2232 2.2914-5.9456 2.2914 5.9456Z"/></svg>
                Claude
              </label>
              <input type="radio" name="agentType" id="launch-agent-codex" value="codex" />
              <label class="launcher-segment" for="launch-agent-codex">
                <svg class="agent-logo" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.4593a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg>
                Codex
              </label>
            </div>
          </div>
          <div class="launcher-row">
            <label class="launcher-toggle"
              title="Resume the folder's previous conversation (claude -c / codex resume --last). Falls back to a fresh session when there is nothing to resume.">
              <input type="checkbox" id="launch-continue" checked />
              continue conversation
            </label>
            <button class="launch-btn" id="launch-btn" type="submit">launch</button>
          </div>
        </form>
    </div>
  </div>
</body>
</html>
